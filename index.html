<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Cody星球闯三关</title>
  <style>
    :root {
      --bg: #07111f;
      --panel: rgba(12, 23, 38, 0.94);
      --panel-2: rgba(16, 31, 52, 0.94);
      --paper: #eef6ff;
      --text: #f7fbff;
      --muted: #9eb4cc;
      --dark: #07111f;
      --cyan: #45d7ff;
      --ice: #88f4ff;
      --orange: #ff7a2f;
      --amber: #ffbd4a;
      --red: #ff4054;
      --green: #54f0a0;
      --purple: #9b7cff;
      --radius: 7px;
      --shadow: 0 22px 56px rgba(0, 0, 0, 0.48);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Microsoft YaHei", "Trebuchet MS", sans-serif;
      background:
        radial-gradient(circle at 16% 10%, rgba(69, 215, 255, 0.18), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(255, 122, 47, 0.18), transparent 25%),
        linear-gradient(145deg, #07111f 0%, #10243d 54%, #1e1a31 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.3;
      background-image:
        linear-gradient(90deg, rgba(69, 215, 255, 0.13) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255, 189, 74, 0.10) 1px, transparent 1px),
        repeating-linear-gradient(135deg, transparent 0 28px, rgba(255, 122, 47, 0.08) 28px 34px);
      background-size: 46px 46px, 46px 46px, 128px 128px;
    }

    button { font: inherit; }
    h1, h2, h3, p { margin: 0; }

    .app {
      position: relative;
      width: min(1220px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 36px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .patch {
      width: 62px;
      height: 62px;
      display: grid;
      place-items: center;
      border: 3px solid #000;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--cyan), var(--amber));
      color: var(--dark);
      box-shadow: 5px 5px 0 #000, 0 0 28px rgba(69, 215, 255, 0.35);
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: 20px;
      transform: skew(-4deg);
    }

    h1 {
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: clamp(32px, 5vw, 64px);
      line-height: 0.96;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 7px;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .tab, .btn, .small, .answer {
      min-height: 42px;
      border: 2px solid #000;
      border-radius: var(--radius);
      background: #13243a;
      color: var(--text);
      box-shadow: 3px 3px 0 #000;
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, filter 140ms ease;
    }

    .tab { padding: 9px 12px; }
    .btn { padding: 11px 15px; font-weight: 900; }
    .small { min-height: 34px; padding: 7px 10px; font-weight: 900; }

    .tab:hover, .btn:hover, .small:hover, .answer:hover {
      transform: translate(-1px, -1px);
      box-shadow: 5px 5px 0 #000;
      filter: brightness(1.08);
    }

    .tab.active, .btn.safe {
      background: var(--cyan);
      color: var(--dark);
      font-weight: 900;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--orange), var(--amber));
      color: var(--dark);
    }

    .btn.ghost {
      background: var(--paper);
      color: var(--dark);
    }

    .btn:disabled, .small:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: grayscale(0.8);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.16fr 0.84fr;
      gap: 15px;
    }

    .ops, .status, .card, .revive-card, .parent-row, .modal-card {
      border: 3px solid #000;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      background: var(--panel);
    }

    .ops {
      position: relative;
      min-height: 455px;
      padding: 24px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255,255,255,0.01)),
        repeating-linear-gradient(90deg, rgba(69, 215, 255, 0.08) 0 8px, transparent 8px 24px),
        #101a2a;
    }

    .ops::before {
      content: "";
      position: absolute;
      right: -36px;
      bottom: -36px;
      width: 380px;
      height: 270px;
      border: 4px solid #000;
      border-radius: 12px;
      background:
        linear-gradient(90deg, transparent 0 18%, rgba(136, 244, 255, 0.9) 18% 25%, transparent 25% 75%, rgba(136, 244, 255, 0.9) 75% 82%, transparent 82%),
        radial-gradient(circle at 50% 32%, var(--amber) 0 16%, transparent 17%),
        linear-gradient(145deg, #536b88, #132135 62%, #07111f);
      clip-path: polygon(12% 0, 88% 0, 100% 28%, 90% 100%, 10% 100%, 0 28%);
      box-shadow: inset -30px -22px 0 rgba(0,0,0,0.32), 10px 10px 0 #000, 0 0 46px rgba(69, 215, 255, 0.26);
      animation: drone 4.2s ease-in-out infinite;
    }

    .ops::after {
      content: "CODY ORBIT";
      position: absolute;
      left: 24px;
      bottom: 18px;
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: clamp(42px, 7vw, 92px);
      color: rgba(69, 215, 255, 0.08);
      pointer-events: none;
    }

    @keyframes drone {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-9px) rotate(1deg); }
    }

    .hero-copy {
      position: relative;
      z-index: 1;
      max-width: 630px;
    }

    .kicker {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 7px 10px;
      border: 2px solid #000;
      border-radius: 999px;
      background: var(--cyan);
      color: var(--dark);
      font-weight: 900;
      margin-bottom: 17px;
    }

    .hero-copy h2 {
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: clamp(38px, 6vw, 82px);
      line-height: 0.94;
      letter-spacing: 0;
    }

    .hero-copy p {
      max-width: 560px;
      margin-top: 18px;
      color: #d6e4f2;
      font-size: 17px;
      line-height: 1.68;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 540px;
      margin-top: 25px;
    }

    .stat {
      border: 2px solid #000;
      border-radius: var(--radius);
      padding: 12px;
      background: rgba(3, 7, 13, 0.72);
    }

    .stat strong {
      display: block;
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: 28px;
      line-height: 1;
      color: var(--cyan);
    }

    .stat span { color: var(--muted); font-size: 13px; }

    .status { padding: 18px; }

    .operator {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 14px;
      align-items: center;
      margin-bottom: 15px;
    }

    .helmet {
      height: 92px;
      border: 3px solid #000;
      border-radius: 14px;
      background:
        radial-gradient(circle at 34% 42%, var(--ice) 0 6px, transparent 7px),
        radial-gradient(circle at 66% 42%, var(--ice) 0 6px, transparent 7px),
        linear-gradient(90deg, transparent 0 27%, var(--cyan) 27% 73%, transparent 73%),
        linear-gradient(135deg, #536b88, #101a2a);
      box-shadow: 5px 5px 0 #000, 0 0 24px rgba(69, 215, 255, 0.24);
    }

    .level { font-size: 24px; font-weight: 900; }

    .bar {
      height: 16px;
      border: 2px solid #000;
      border-radius: 999px;
      overflow: hidden;
      background: #07111f;
      margin-top: 8px;
    }

    .bar > i {
      display: block;
      height: 100%;
      width: 34%;
      background: linear-gradient(90deg, var(--cyan), var(--amber));
    }

    .ability { display: grid; gap: 10px; margin-top: 14px; }

    .ability-row {
      display: grid;
      grid-template-columns: 76px 1fr 42px;
      gap: 9px;
      align-items: center;
      font-size: 14px;
    }

    main { margin-top: 15px; }
    .view { display: none; }
    .view.active { display: block; animation: rise 240ms ease both; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .planet-map {
      min-height: 560px;
      position: relative;
      display: grid;
      place-items: center;
      overflow: hidden;
      border: 3px solid #000;
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 50% 50%, rgba(69, 215, 255, 0.15), transparent 28%),
        radial-gradient(circle at 18% 22%, rgba(255, 189, 74, 0.16), transparent 16%),
        radial-gradient(circle at 84% 28%, rgba(155, 124, 255, 0.16), transparent 18%),
        linear-gradient(145deg, rgba(10, 21, 36, 0.96), rgba(9, 15, 28, 0.98));
      box-shadow: var(--shadow);
    }

    .orbit-ring {
      position: absolute;
      width: min(72vw, 760px);
      height: min(72vw, 760px);
      max-width: 760px;
      max-height: 760px;
      border: 2px dashed rgba(136, 244, 255, 0.28);
      border-radius: 50%;
      transform: rotate(-11deg);
      pointer-events: none;
    }

    .orbit-ring.second {
      width: min(52vw, 560px);
      height: min(52vw, 560px);
      opacity: 0.78;
      transform: rotate(18deg);
    }

    .ship-core {
      position: relative;
      z-index: 2;
      width: 210px;
      min-height: 168px;
      display: grid;
      place-items: center;
      text-align: center;
      border: 3px solid #000;
      border-radius: 18px;
      background:
        linear-gradient(90deg, transparent 0 17%, rgba(136, 244, 255, 0.88) 17% 25%, transparent 25% 75%, rgba(136, 244, 255, 0.88) 75% 83%, transparent 83%),
        radial-gradient(circle at 50% 34%, var(--amber) 0 15%, transparent 16%),
        linear-gradient(145deg, #536b88, #132135 62%, #07111f);
      clip-path: polygon(12% 0, 88% 0, 100% 28%, 90% 100%, 10% 100%, 0 28%);
      box-shadow: inset -22px -18px 0 rgba(0,0,0,0.24), 9px 9px 0 #000, 0 0 44px rgba(69, 215, 255, 0.28);
    }

    .ship-core strong {
      display: block;
      margin-top: 18px;
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: 32px;
      color: var(--paper);
    }

    .ship-core span {
      display: block;
      color: #c8d8e9;
      font-size: 13px;
      padding: 0 18px;
      line-height: 1.4;
    }

    .planet-card {
      position: absolute;
      z-index: 3;
      width: 230px;
      min-height: 230px;
      display: grid;
      place-items: center;
      text-align: center;
      border: 3px solid #000;
      border-radius: 50%;
      padding: 22px;
      background:
        radial-gradient(circle at 34% 26%, rgba(255,255,255,0.5), transparent 17%),
        radial-gradient(circle at 68% 68%, rgba(0,0,0,0.2), transparent 25%),
        var(--accent, var(--cyan));
      color: #07111f;
      box-shadow: 8px 8px 0 #000, 0 0 34px color-mix(in srgb, var(--accent, var(--cyan)) 42%, transparent);
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
    }

    .planet-card:hover {
      transform: translate(-2px, -4px) scale(1.03);
      box-shadow: 11px 11px 0 #000, 0 0 46px color-mix(in srgb, var(--accent, var(--cyan)) 56%, transparent);
      filter: saturate(1.06);
    }

    .planet-card.locked {
      filter: grayscale(0.75);
      opacity: 0.72;
      cursor: not-allowed;
    }

    .planet-card.math { left: 7%; top: 13%; }
    .planet-card.chinese { right: 7%; top: 17%; }
    .planet-card.english { left: 50%; bottom: 7%; transform: translateX(-50%); }
    .planet-card.english:hover { transform: translate(-50%, -4px) scale(1.03); }

    .planet-card .tag {
      background: rgba(255,255,255,0.8);
      margin-bottom: 8px;
    }

    .planet-card h3 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .planet-card p {
      color: rgba(7, 17, 31, 0.78);
      font-size: 13px;
      line-height: 1.45;
      margin-bottom: 12px;
    }

    .planet-card .small {
      background: rgba(238, 246, 255, 0.92);
      color: #07111f;
    }

    .card {
      min-height: 205px;
      padding: 15px;
      overflow: hidden;
      position: relative;
      background: var(--panel-2);
    }

    .card::after {
      content: "";
      position: absolute;
      right: -38px;
      bottom: -48px;
      width: 136px;
      height: 136px;
      border: 3px solid #000;
      border-radius: 50%;
      background: var(--accent, var(--cyan));
      opacity: 0.72;
    }

    .tag {
      display: inline-block;
      border: 2px solid #000;
      border-radius: 999px;
      padding: 4px 8px;
      background: var(--accent, var(--cyan));
      color: var(--dark);
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 11px;
    }

    .card h3 {
      position: relative;
      z-index: 1;
      font-size: 22px;
      margin-bottom: 8px;
    }

    .card p {
      position: relative;
      z-index: 1;
      color: #c7d7e8;
      font-size: 14px;
      line-height: 1.52;
    }

    .card footer {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 16px;
    }

    .revive-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .revive-card {
      padding: 14px;
      background: var(--panel);
    }

    .revive-card.done {
      background: rgba(20, 47, 64, 0.94);
    }

    .revive-card h3 { font-size: 20px; margin-bottom: 8px; }

    .revive-card p {
      color: #c7d7e8;
      line-height: 1.5;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .briefing {
      display: none;
      border: 2px dashed rgba(69, 215, 255, 0.4);
      border-radius: var(--radius);
      padding: 10px;
      margin: 10px 0;
      color: #edf7ff;
      line-height: 1.55;
      background: rgba(0,0,0,0.2);
    }

    .revive-card.seen .briefing { display: block; }

    .parent {
      display: grid;
      gap: 12px;
    }

    .parent-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 15px;
    }

    .parent-row p {
      color: #c7d7e8;
      margin-top: 5px;
      line-height: 1.5;
    }

    .score {
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: 30px;
      color: var(--cyan);
      white-space: nowrap;
    }

    .progress-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .progress-chip {
      border: 2px solid #000;
      border-radius: var(--radius);
      padding: 10px;
      background: rgba(7, 17, 31, 0.58);
    }

    .progress-chip b {
      display: block;
      color: var(--text);
      margin-bottom: 4px;
    }

    .progress-chip span {
      color: var(--muted);
      font-size: 13px;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.76);
    }

    .modal.open { display: grid; }

    .modal-card {
      width: min(820px, 100%);
      padding: 20px;
    }

    .question-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }

    .question-title {
      font-size: clamp(24px, 4.8vw, 42px);
      line-height: 1.18;
    }

    .audio-line {
      display: none;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin: 12px 0 2px;
    }

    .audio-line.active { display: flex; }

    .audio-note {
      color: var(--muted);
      font-size: 13px;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 16px;
    }

    .answer {
      min-height: 66px;
      padding: 12px;
      text-align: left;
      background: var(--paper);
      color: var(--dark);
      font-size: 18px;
      font-weight: 900;
    }

    .answer.correct { background: var(--green); color: var(--dark); }
    .answer.wrong { background: var(--red); color: white; }

    .feedback {
      min-height: 52px;
      margin-top: 14px;
      padding: 12px;
      border: 2px dashed rgba(69, 215, 255, 0.42);
      border-radius: var(--radius);
      color: #e9f5ff;
      line-height: 1.55;
    }

    .modal-actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    @media (max-width: 900px) {
      .topbar, .hero { grid-template-columns: 1fr; }
      .tabs { justify-content: flex-start; }
      .grid, .revive-list { grid-template-columns: repeat(2, 1fr); }
      .planet-map { min-height: 720px; }
      .planet-card.math { left: 4%; top: 8%; }
      .planet-card.chinese { right: 4%; top: 13%; }
      .planet-card.english { bottom: 6%; }
      .ops { min-height: 540px; }
      .ops::before { width: 280px; height: 215px; }
    }

    @media (max-width: 570px) {
      .app { width: min(100% - 18px, 1220px); padding-top: 12px; }
      .brand { align-items: flex-start; }
      .patch { width: 50px; height: 50px; font-size: 17px; }
      .ops { padding: 16px; min-height: 680px; }
      .stats, .grid, .revive-list, .answers { grid-template-columns: 1fr; }
      .progress-grid { grid-template-columns: 1fr; }
      .planet-map {
        min-height: auto;
        display: grid;
        gap: 14px;
        padding: 16px;
      }
      .orbit-ring { display: none; }
      .ship-core, .planet-card, .planet-card.math, .planet-card.chinese, .planet-card.english {
        position: relative;
        left: auto;
        right: auto;
        top: auto;
        bottom: auto;
        transform: none;
        width: 100%;
        min-height: 150px;
        border-radius: var(--radius);
      }
      .planet-card.english:hover { transform: translate(-2px, -4px) scale(1.02); }
      .parent-row { grid-template-columns: 1fr; }
      .operator { grid-template-columns: 72px 1fr; }
      .helmet { height: 72px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="patch">CODY</div>
        <div>
          <h1>Cody星球闯三关</h1>
          <p class="subtitle">数学、语文、英语三科任务；错题倒地，看讲解，改正后复活再开一局。</p>
        </div>
      </div>
      <nav class="tabs" aria-label="页面">
        <button class="tab active" data-view="home">星球地图</button>
        <button class="tab" data-view="revive">陨石坑复活站</button>
        <button class="tab" data-view="parent">家长雷达</button>
      </nav>
    </header>

    <section class="hero">
      <div class="ops">
        <div class="hero-copy">
          <div class="kicker">三科期末 · 每天30分钟</div>
          <h2>选择星球，开始闯关。</h2>
          <p>数学星、语文星、英语星围绕 Cody 飞船。每科 30 题题库，每局随机抽 5 题；答错会掉进陨石坑复活站，改正后才能继续航行。</p>
          <div class="hero-actions">
            <button class="btn primary" id="startToday">开始今日三关</button>
            <button class="btn safe" id="reviveBtn">复活再玩一局</button>
            <button class="btn ghost" data-jump="parent">看家长建议</button>
          </div>
          <div class="stats">
            <div class="stat"><strong id="todayDone">0/3</strong><span>今日三关</span></div>
            <div class="stat"><strong id="downedCount">0</strong><span>倒地题</span></div>
            <div class="stat"><strong id="streakCount">1</strong><span>连续天数</span></div>
          </div>
        </div>
      </div>

      <aside class="status">
        <div class="operator">
          <div class="helmet"></div>
          <div>
            <div class="level">Lv.<span id="level">3</span> 三科行动队员</div>
            <p class="subtitle">距离下一等级还差 <span id="nextXp">80</span> 能量</p>
            <div class="bar"><i id="xpBar"></i></div>
          </div>
        </div>
        <h3>三科掌握度</h3>
        <div class="ability" id="abilities"></div>
      </aside>
    </section>

    <main>
      <section class="view active" id="home">

          { q: "听音频，句子说去了哪里？", a: "museum", options: ["museum", "zoo", "school", "shop"], hint: "听 visited the ...", explain: "We visited the museum last Friday. 句子说去了 museum。", audio: "audio/eng-museum.wav", speak: "We visited the museum last Friday." },
          { q: "听音频，她什么时候完成作业？", a: "before dinner", options: ["after dinner", "before dinner", "in the morning", "at school"], hint: "听 before dinner。", explain: "She finished her homework before dinner. 表示她晚饭前完成作业。", audio: "audio/eng-homework.wav", speak: "She finished her homework before dinner." },
          { q: "听音频，说话者最喜欢的季节是？", a: "spring", options: ["spring", "summer", "autumn", "winter"], hint: "favourite season。", explain: "My favourite season is spring. 最喜欢的季节是 spring。", audio: "audio/eng-season.wav", speak: "My favourite season is spring." },
          { q: "听音频，他们在做什么运动？", a: "basketball", options: ["football", "basketball", "ping-pong", "swimming"], hint: "听 playing ...", explain: "They are playing basketball after school. 他们在打篮球。", audio: "audio/eng-basketball.wav", speak: "They are playing basketball after school." },
          { q: "听音频，说话者请求喝什么？", a: "water", options: ["milk", "juice", "water", "tea"], hint: "drink some ...", explain: "Please drink some water. 请求喝水。", audio: "audio/eng-water.wav", speak: "Please drink some water." },
          { q: "听音频，故事怎么样？", a: "interesting and funny", options: ["boring", "interesting and funny", "too long", "sad"], hint: "听两个形容词。", explain: "The story is interesting and funny. 故事有趣又好笑。", audio: "audio/eng-story.wav", speak: "The story is interesting and funny." },
          { q: "听音频，说话者怎样去学校？", a: "by bike", options: ["by bus", "by bike", "on foot", "by car"], hint: "ride my bike。", explain: "I ride my bike to school. 表示骑自行车去学校。", audio: "audio/eng-bike.wav", speak: "I ride my bike to school." },
          { q: "听音频，农场上有什么？", a: "many animals", options: ["many books", "many animals", "many cars", "many desks"], hint: "on the farm。", explain: "There are many animals on the farm. 农场上有很多动物。", audio: "audio/eng-farm.wav", speak: "There are many animals on the farm." },
          { q: "听音频，请打开什么？", a: "window", options: ["door", "book", "window", "box"], hint: "Open the ...", explain: "Open the window, please. 请打开窗户。", audio: "audio/eng-window.wav", speak: "Open the window, please." },
          { q: "听音频，应该仔细看什么？", a: "picture", options: ["picture", "map", "clock", "letter"], hint: "Look at the ...", explain: "Look at the picture carefully. 仔细看图片。", audio: "audio/eng-picture.wav", speak: "Look at the picture carefully." },
          { q: "I ____ a student.", a: "am", options: ["am", "is", "are", "be"], hint: "I 搭配 am。", explain: "主语 I 后面用 am。" },
          { q: "She ____ tall and thin.", a: "is", options: ["am", "is", "are", "be"], hint: "She 是第三人称单数。", explain: "She 后面用 is。" },
          { q: "They ____ playing football.", a: "are", options: ["am", "is", "are", "be"], hint: "They 是复数。", explain: "They 后面用 are，are playing 是现在进行时。" },
          { q: "选择正确复数：box", a: "boxes", options: ["boxs", "boxes", "boxies", "box"], hint: "以 x 结尾加 es。", explain: "box 的复数是 boxes。" },
          { q: "选择正确过去式：visit", a: "visited", options: ["visits", "visited", "visitting", "visit"], hint: "规则动词加 ed。", explain: "visit 的过去式是 visited。" },
          { q: "选择正确过去式：go", a: "went", options: ["goed", "goes", "went", "going"], hint: "go 是不规则动词。", explain: "go 的过去式是 went。" },
          { q: "What time is it? 可以回答：", a: "It is seven o'clock.", options: ["I am fine.", "It is seven o'clock.", "It is red.", "I like apples."], hint: "问时间。", explain: "What time is it? 是问几点了。" },
          { q: "How many books do you have? 是问什么？", a: "有多少本书", options: ["书在哪里", "有多少本书", "书是谁的", "书多少钱"], hint: "How many 问数量。", explain: "How many books 表示多少本书。" },
          { q: "选择同类词：apple, banana, ____", a: "orange", options: ["orange", "desk", "run", "blue"], hint: "前两个都是水果。", explain: "apple、banana、orange 都是水果。" },
          { q: "选择反义词：hot", a: "cold", options: ["warm", "cold", "sunny", "big"], hint: "热的反义词。", explain: "hot 的反义词是 cold。" },
          { q: "选择正确句子：", a: "I like English.", options: ["I likes English.", "I like English.", "I liking English.", "I is like English."], hint: "I 后面动词用原形。", explain: "I like English. 是正确表达。" },
          { q: "There ____ a cat under the table.", a: "is", options: ["is", "are", "am", "be"], hint: "a cat 是单数。", explain: "There is + 单数名词。" },
          { q: "There ____ two dogs in the park.", a: "are", options: ["is", "are", "am", "be"], hint: "two dogs 是复数。", explain: "There are + 复数名词。" },
          { q: "Can you swim? 肯定回答是：", a: "Yes, I can.", options: ["Yes, I do.", "Yes, I can.", "Yes, I am.", "Yes, I is."], hint: "Can 开头，用 can 回答。", explain: "Can you...? 的肯定回答是 Yes, I can." },
          { q: "选择正确翻译：我正在读书。", a: "I am reading a book.", options: ["I read a book yesterday.", "I am reading a book.", "I reads a book.", "I reading book."], hint: "正在做用 am doing。", explain: "I am reading a book. 表示我正在读书。" }
        ]
      }
    ];

    const todayKey = new Date().toLocaleDateString("zh-CN", {
      year: "numeric",
      month: "2-digit",
      day: "2-digit"
    }).split("/").join("-");

    const state = {
      xp: 140,
      level: 3,
      streak: 1,
      date: todayKey,
      completed: {},
      downed: [],
      currentSubject: null,
      currentQuestions: [],
      index: 0,
      score: 0,
      answered: false
    };

    const abilityBase = { "数学": 36, "语文": 32, "英语": 28 };
    const $ = (id) => document.getElementById(id);
    const activeDowned = () => state.downed.filter(item => !item.corrected);
    const storageKey = `cody-planet-progress-${todayKey}`;

    function loadProgress() {
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey) || "null");
        if (!saved || saved.date !== todayKey) return;
        state.xp = saved.xp ?? state.xp;
        state.level = saved.level ?? state.level;
        state.streak = saved.streak ?? state.streak;
        state.completed = saved.completed || {};
        state.downed = saved.downed || [];
      } catch (error) {
        console.warn("Progress load failed", error);
      }
    }

    function saveProgress() {
      try {
        localStorage.setItem(storageKey, JSON.stringify({
          date: todayKey,
          xp: state.xp,
          level: state.level,
          streak: state.streak,
          completed: state.completed,
          downed: state.downed
        }));
      } catch (error) {
        console.warn("Progress save failed", error);
      }
    }

    function render() {
      $("streakCount").textContent = state.streak;
      $("level").textContent = state.level;
      $("nextXp").textContent = Math.max(0, 220 - state.xp);
      $("xpBar").style.width = Math.min(100, state.xp / 220 * 100) + "%";
      $("todayDone").textContent = `${Object.keys(state.completed).length}/3`;
      $("downedCount").textContent = activeDowned().length;
      $("reviveBtn").disabled = activeDowned().length > 0;
      $("reviveBtn").textContent = activeDowned().length > 0 ? "先清倒地题" : "复活再玩一局";
      renderAbilities();
      renderQuests();
      renderRevive();
      renderParent();
    }

    function renderAbilities() {
      const bonus = Object.keys(state.completed).length * 6;
      const penalty = Math.min(12, activeDowned().length * 3);
      $("abilities").innerHTML = Object.entries(abilityBase).map(([name, base]) => {
        const value = Math.max(8, Math.min(99, base + bonus - penalty));
        return `
          <div class="ability-row">
            <b>${name}</b>
            <div class="bar"><i style="width:${value}%; background:${value > 45 ? "linear-gradient(90deg, var(--green), var(--cyan))" : "linear-gradient(90deg, var(--orange), var(--amber))"}"></i></div>
            <span>${value}</span>
          </div>
        `;
      }).join("");
    }

    function questCard(s) {
      const locked = activeDowned().length > 0;
      const done = state.completed[s.id];
      return `
        <article class="planet-card ${s.id} ${locked ? "locked" : ""}" style="--accent:${s.color}" data-subject="${s.id}">
          <span class="tag">${done ? "已通关" : s.tag}</span>
          <h3>${s.title}</h3>
          <p>${s.desc}</p>
          <button class="small" ${locked ? "disabled" : ""}>${locked ? "需复活" : done ? "再开一局" : "进入星球"}</button>
        </article>
      `;
    }

    function renderQuests() {
      $("questGrid").innerHTML = `
        <div class="orbit-ring"></div>
        <div class="orbit-ring second"></div>
        <div class="ship-core">
          <div>
            <strong>CODY</strong>
            <span>选择一颗星球，完成今日三关</span>
          </div>
        </div>
        ${subjects.map(questCard).join("")}
      `;
      document.querySelectorAll("[data-subject]").forEach(btn => {
        btn.addEventListener("click", () => startSubject(btn.dataset.subject));
      });
    }

    function renderRevive() {
      if (!state.downed.length) {
        $("reviveList").innerHTML = `
          <div class="revive-card">
            <h3>陨石坑空闲</h3>
            <p>做错的题会掉进这里。先看“讲解+正确答案”，英语题也可以重听音频；点“我已改正”后，全部清空才能复活再玩一局。</p>
          </div>
        `;
        return;
      }
      $("reviveList").innerHTML = state.downed.map((item, idx) => `
        <article class="revive-card ${item.seen ? "seen" : ""} ${item.corrected ? "done" : ""}">
          <span class="tag">${item.corrected ? "已复活" : "倒地题"}</span>
          <h3>${item.subjectTitle}</h3>
          <p><b>题目：</b>${item.q}</p>
          <p><b>你的答案：</b>${item.wrong}　<b>正确答案：</b>${item.a}</p>
          <div class="briefing">
            <b>讲解：</b>${item.explain}<br>
            <b>正确答案：</b>${item.a}
          </div>
          ${item.audio ? `<button class="small" data-replay="${idx}">重听音频</button>` : ""}
          <button class="small" data-video="${idx}">${item.seen ? "重看讲解" : "看讲解+正确答案"}</button>
          <button class="small" data-correct="${idx}" ${item.seen && !item.corrected ? "" : "disabled"}>我已改正，申请复活</button>
        </article>
      `).join("");
      document.querySelectorAll("[data-video]").forEach(btn => {
        btn.addEventListener("click", () => {
          state.downed[Number(btn.dataset.video)].seen = true;
          saveProgress();
          render();
        });
      });
      document.querySelectorAll("[data-correct]").forEach(btn => {
        btn.addEventListener("click", () => {
          const item = state.downed[Number(btn.dataset.correct)];
          if (!item.seen) return;
          item.corrected = true;
          state.xp += 10;
          saveProgress();
          render();
        });
      });
      document.querySelectorAll("[data-replay]").forEach(btn => {
        btn.addEventListener("click", () => {
          const item = state.downed[Number(btn.dataset.replay)];
          playPromptAudio(item);
        });
      });
    }

    function renderParent() {
      const done = Object.keys(state.completed).length;
      const needs = activeDowned();
      const focus = needs[0]?.subjectTitle || "暂无倒地题";
      const isComplete = done === subjects.length && needs.length === 0;
      const subjectProgress = subjects.map(subject => `
        <div class="progress-chip">
          <b>${subject.title}</b>
          <span>${state.completed[subject.id] ? "已完成" : "未完成"}</span>
        </div>
      `).join("");
      $("parentPanel").innerHTML = `
        <div class="parent-row">
          <div>
            <h3>今日完成状态</h3>
            <p>${todayKey}：${isComplete ? "今日三关已完成，倒地题已清空。" : "今日还未完成，请继续完成三关或清空倒地题。"}</p>
            <div class="progress-grid">${subjectProgress}</div>
          </div>
          <div class="score">${isComplete ? "完成" : "未完成"}</div>
        </div>
        <div class="parent-row">
          <div><h3>今日三关节奏</h3><p>建议每天数学、语文、英语各 1 关，每关 5 题。总时长 30 分钟以内，完成后再给娱乐时间。</p></div>
          <div class="score">${done}/3</div>
        </div>
        <div class="parent-row">
          <div><h3>陨石坑复活机制</h3><p>只要有错题未改正，就不能继续开局。这样可以把“输一局”转成“复盘一局”，更容易补基础。</p></div>
          <div class="score">${needs.length}</div>
        </div>
        <div class="parent-row">
          <div><h3>当前最该补</h3><p>${needs.length ? "先处理这个倒地题，再进入下一局。" : "可以开始新一轮三科任务。"}</p></div>
          <div class="score">${focus}</div>
        </div>
      `;
    }

    function startSubject(id) {
      if (activeDowned().length > 0) {
        document.querySelector('.tab[data-view="revive"]').click();
        return;
      }
      const subject = subjects.find(s => s.id === id);
      if (!subject) return;
      state.currentSubject = subject;
      state.currentQuestions = pickQuestions(subject.questions, 5);
      state.index = 0;
      state.score = 0;
      state.answered = false;
      $("questModal").classList.add("open");
      showQuestion();
    }

    function pickQuestions(pool, count) {
      return [...pool].sort(() => Math.random() - 0.5).slice(0, count);
    }

    function showQuestion() {
      const subject = state.currentSubject;
      const question = state.currentQuestions[state.index];
      state.answered = false;
      $("questTag").textContent = subject.title;
      $("questionTitle").textContent = question.q;
      $("questionProgress").style.width = `${state.index / state.currentQuestions.length * 100}%`;
      $("feedback").textContent = "选一个答案。错题会进入复活站，看讲解并改正后才能复活。";
      $("answers").innerHTML = question.options.map(opt => `<button class="answer" data-answer="${opt}">${opt}</button>`).join("");
      $("audioLine").classList.toggle("active", Boolean(question.audio || question.speak));
      $("audioNote").textContent = "";
      document.querySelectorAll(".answer").forEach(btn => {
        btn.addEventListener("click", () => answer(btn.dataset.answer, btn));
      });
    }

    function playPromptAudio(question) {
      if (!question) return;
      if (question.audio) {
        const audio = new Audio(question.audio);
        audio.preload = "auto";
        audio.play().catch(() => speakFallback(question.speak || question.q));
        return;
      }
      speakFallback(question.speak || question.q);
    }

    function speakFallback(text) {
      if (!("speechSynthesis" in window)) {
        $("feedback").textContent = "当前浏览器不支持朗读，请查看题目文字。";
        return;
      }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = 0.88;
      const voices = window.speechSynthesis.getVoices();
      const enVoice = voices.find(v => /en[-_](US|GB)/i.test(v.lang)) || voices.find(v => /^en/i.test(v.lang));
      if (enVoice) utterance.voice = enVoice;
      window.speechSynthesis.speak(utterance);
    }

    function answer(value, btn) {
      if (state.answered) return;
      state.answered = true;
      const question = state.currentQuestions[state.index];
      const correct = value === question.a;
      document.querySelectorAll(".answer").forEach(b => {
        if (b.dataset.answer === question.a) b.classList.add("correct");
      });
      if (correct) {
        state.score += 1;
        state.xp += 12;
        saveProgress();
        $("feedback").textContent = "命中目标！能量 +12。";
      } else {
        btn.classList.add("wrong");
        const key = `${state.currentSubject.id}-${question.q}`;
        if (!state.downed.some(item => item.key === key && !item.corrected)) {
          state.downed.push({
            key,
            subjectTitle: state.currentSubject.title,
            q: question.q,
            a: question.a,
            wrong: value,
            explain: question.explain,
            audio: question.audio,
            speak: question.speak,
            seen: false,
            corrected: false
          });
        }
        saveProgress();
        $("feedback").textContent = `飞船坠入陨石坑：这题已进入复活站。提示：${question.hint}`;
      }
      render();
    }

    function nextQuestion() {
      if (!state.currentSubject) return;
      if (state.index < state.currentQuestions.length - 1) {
        state.index += 1;
        showQuestion();
      } else {
        finishSubject();
      }
    }

    function finishSubject() {
      const subject = state.currentSubject;
      state.completed[subject.id] = true;
      if (state.score >= 4) {
        state.xp += 30;
        $("feedback").textContent = `成功通关！本关 ${state.score}/5，额外能量 +30。`;
      } else {
        $("feedback").textContent = `完成行动，本关 ${state.score}/5。先去陨石坑复活站清倒地题，再开下一局。`;
      }
      if (state.xp >= 220) {
        state.level += 1;
        state.xp -= 220;
      }
      saveProgress();
      state.currentSubject = null;
      state.currentQuestions = [];
      $("questionProgress").style.width = "100%";
      setTimeout(() => {
        $("questModal").classList.remove("open");
        render();
        if (activeDowned().length > 0) document.querySelector('.tab[data-view="revive"]').click();
      }, 900);
    }

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
        tab.classList.add("active");
        $(tab.dataset.view).classList.add("active");
      });
    });

    document.querySelectorAll("[data-jump]").forEach(btn => {
      btn.addEventListener("click", () => document.querySelector(`.tab[data-view="${btn.dataset.jump}"]`).click());
    });

    $("startToday").addEventListener("click", () => {
      const next = subjects.find(s => !state.completed[s.id]) || subjects[0];
      startSubject(next.id);
    });

    $("reviveBtn").addEventListener("click", () => {
      if (activeDowned().length > 0) {
        document.querySelector('.tab[data-view="revive"]').click();
      } else {
        startSubject(subjects[0].id);
      }
    });

    $("closeModal").addEventListener("click", () => $("questModal").classList.remove("open"));
    $("nextQuestion").addEventListener("click", nextQuestion);
    $("showHint").addEventListener("click", () => {
      if (!state.currentSubject) return;
      $("feedback").textContent = state.currentQuestions[state.index].hint;
    });
    $("playAudio").addEventListener("click", () => {
      if (!state.currentSubject) return;
      playPromptAudio(state.currentQuestions[state.index]);
    });

    if ("speechSynthesis" in window) {
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

    loadProgress();
    render();
  </script>
</body>
</html>
