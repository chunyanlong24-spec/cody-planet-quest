<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cody星球闯三关</title>
  <style>
    :root {
      --bg: #07111f;
      --panel: rgba(12, 23, 38, 0.94);
      --panel-2: rgba(16, 31, 52, 0.94);
      --paper: #eef6ff;
      --text: #f7fbff;
      --muted: #9eb4cc;
      --dark: #07111f;
      --cyan: #45d7ff;
      --ice: #88f4ff;
      --orange: #ff7a2f;
      --amber: #ffbd4a;
      --red: #ff4054;
      --green: #54f0a0;
      --purple: #9b7cff;
      --radius: 7px;
      --shadow: 0 22px 56px rgba(0, 0, 0, 0.48);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Microsoft YaHei", "Trebuchet MS", sans-serif;
      background:
        radial-gradient(circle at 16% 10%, rgba(69, 215, 255, 0.18), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(255, 122, 47, 0.18), transparent 25%),
        linear-gradient(145deg, #07111f 0%, #10243d 54%, #1e1a31 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.3;
      background-image:
        linear-gradient(90deg, rgba(69, 215, 255, 0.13) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255, 189, 74, 0.10) 1px, transparent 1px),
        repeating-linear-gradient(135deg, transparent 0 28px, rgba(255, 122, 47, 0.08) 28px 34px);
      background-size: 46px 46px, 46px 46px, 128px 128px;
    }

    button { font: inherit; }
    h1, h2, h3, p { margin: 0; }

    .app {
      position: relative;
      width: min(1220px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 36px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .patch {
      width: 62px;
      height: 62px;
      display: grid;
      place-items: center;
      border: 3px solid #000;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--cyan), var(--amber));
      color: var(--dark);
      box-shadow: 5px 5px 0 #000, 0 0 28px rgba(69, 215, 255, 0.35);
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: 20px;
      transform: skew(-4deg);
    }

    h1 {
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: clamp(32px, 5vw, 64px);
      line-height: 0.96;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 7px;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .tab, .btn, .small, .answer {
      min-height: 42px;
      border: 2px solid #000;
      border-radius: var(--radius);
      background: #13243a;
      color: var(--text);
      box-shadow: 3px 3px 0 #000;
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, filter 140ms ease;
    }

    .tab { padding: 9px 12px; }
    .btn { padding: 11px 15px; font-weight: 900; }
    .small { min-height: 34px; padding: 7px 10px; font-weight: 900; }

    .tab:hover, .btn:hover, .small:hover, .answer:hover {
      transform: translate(-1px, -1px);
      box-shadow: 5px 5px 0 #000;
      filter: brightness(1.08);
    }

    .tab.active, .btn.safe {
      background: var(--cyan);
      color: var(--dark);
      font-weight: 900;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--orange), var(--amber));
      color: var(--dark);
    }

    .btn.ghost {
      background: var(--paper);
      color: var(--dark);
    }

    .btn:disabled, .small:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: grayscale(0.8);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.16fr 0.84fr;
      gap: 15px;
    }

    .ops, .status, .card, .revive-card, .parent-row, .modal-card {
      border: 3px solid #000;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      background: var(--panel);
    }

    .ops {
      position: relative;
      min-height: 455px;
      padding: 24px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255,255,255,0.01)),
        repeating-linear-gradient(90deg, rgba(69, 215, 255, 0.08) 0 8px, transparent 8px 24px),
        #101a2a;
    }

    .ops::before {
      content: "";
      position: absolute;
      right: -36px;
      bottom: -36px;
      width: 380px;
      height: 270px;
      border: 4px solid #000;
      border-radius: 12px;
      background:
        linear-gradient(90deg, transparent 0 18%, rgba(136, 244, 255, 0.9) 18% 25%, transparent 25% 75%, rgba(136, 244, 255, 0.9) 75% 82%, transparent 82%),
        radial-gradient(circle at 50% 32%, var(--amber) 0 16%, transparent 17%),
        linear-gradient(145deg, #536b88, #132135 62%, #07111f);
      clip-path: polygon(12% 0, 88% 0, 100% 28%, 90% 100%, 10% 100%, 0 28%);
      box-shadow: inset -30px -22px 0 rgba(0,0,0,0.32), 10px 10px 0 #000, 0 0 46px rgba(69, 215, 255, 0.26);
      animation: drone 4.2s ease-in-out infinite;
    }

    .ops::after {
      content: "THREE MISSIONS";
      position: absolute;
      left: 24px;
      bottom: 18px;
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: clamp(42px, 7vw, 92px);
      color: rgba(69, 215, 255, 0.08);
      pointer-events: none;
    }

    @keyframes drone {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-9px) rotate(1deg); }
    }

    .hero-copy {
      position: relative;
      z-index: 1;
      max-width: 630px;
    }

    .kicker {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 7px 10px;
      border: 2px solid #000;
      border-radius: 999px;
      background: var(--cyan);
      color: var(--dark);
      font-weight: 900;
      margin-bottom: 17px;
    }

    .hero-copy h2 {
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: clamp(38px, 6vw, 82px);
      line-height: 0.94;
      letter-spacing: 0;
    }

    .hero-copy p {
      max-width: 560px;
      margin-top: 18px;
      color: #d6e4f2;
      font-size: 17px;
      line-height: 1.68;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 540px;
      margin-top: 25px;
    }

    .stat {
      border: 2px solid #000;
      border-radius: var(--radius);
      padding: 12px;
      background: rgba(3, 7, 13, 0.72);
    }

    .stat strong {
      display: block;
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: 28px;
      line-height: 1;
      color: var(--cyan);
    }

    .stat span { color: var(--muted); font-size: 13px; }

    .status { padding: 18px; }

    .operator {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 14px;
      align-items: center;
      margin-bottom: 15px;
    }

    .helmet {
      height: 92px;
      border: 3px solid #000;
      border-radius: 14px;
      background:
        radial-gradient(circle at 34% 42%, var(--ice) 0 6px, transparent 7px),
        radial-gradient(circle at 66% 42%, var(--ice) 0 6px, transparent 7px),
        linear-gradient(90deg, transparent 0 27%, var(--cyan) 27% 73%, transparent 73%),
        linear-gradient(135deg, #536b88, #101a2a);
      box-shadow: 5px 5px 0 #000, 0 0 24px rgba(69, 215, 255, 0.24);
    }

    .level { font-size: 24px; font-weight: 900; }

    .bar {
      height: 16px;
      border: 2px solid #000;
      border-radius: 999px;
      overflow: hidden;
      background: #07111f;
      margin-top: 8px;
    }

    .bar > i {
      display: block;
      height: 100%;
      width: 34%;
      background: linear-gradient(90deg, var(--cyan), var(--amber));
    }

    .ability { display: grid; gap: 10px; margin-top: 14px; }

    .ability-row {
      display: grid;
      grid-template-columns: 76px 1fr 42px;
      gap: 9px;
      align-items: center;
      font-size: 14px;
    }

    main { margin-top: 15px; }
    .view { display: none; }
    .view.active { display: block; animation: rise 240ms ease both; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .card {
      min-height: 205px;
      padding: 15px;
      overflow: hidden;
      position: relative;
      background: var(--panel-2);
    }

    .card::after {
      content: "";
      position: absolute;
      right: -38px;
      bottom: -48px;
      width: 136px;
      height: 136px;
      border: 3px solid #000;
      border-radius: 50%;
      background: var(--accent, var(--cyan));
      opacity: 0.72;
    }

    .tag {
      display: inline-block;
      border: 2px solid #000;
      border-radius: 999px;
      padding: 4px 8px;
      background: var(--accent, var(--cyan));
      color: var(--dark);
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 11px;
    }

    .card h3 {
      position: relative;
      z-index: 1;
      font-size: 22px;
      margin-bottom: 8px;
    }

    .card p {
      position: relative;
      z-index: 1;
      color: #c7d7e8;
      font-size: 14px;
      line-height: 1.52;
    }

    .card footer {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 16px;
    }

    .revive-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .revive-card {
      padding: 14px;
      background: var(--panel);
    }

    .revive-card.done {
      background: rgba(20, 47, 64, 0.94);
    }

    .revive-card h3 { font-size: 20px; margin-bottom: 8px; }

    .revive-card p {
      color: #c7d7e8;
      line-height: 1.5;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .briefing {
      display: none;
      border: 2px dashed rgba(69, 215, 255, 0.4);
      border-radius: var(--radius);
      padding: 10px;
      margin: 10px 0;
      color: #edf7ff;
      line-height: 1.55;
      background: rgba(0,0,0,0.2);
    }

    .revive-card.seen .briefing { display: block; }

    .parent {
      display: grid;
      gap: 12px;
    }

    .parent-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 15px;
    }

    .parent-row p {
      color: #c7d7e8;
      margin-top: 5px;
      line-height: 1.5;
    }

    .score {
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: 30px;
      color: var(--cyan);
      white-space: nowrap;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.76);
    }

    .modal.open { display: grid; }

    .modal-card {
      width: min(820px, 100%);
      padding: 20px;
    }

    .question-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }

    .question-title {
      font-size: clamp(24px, 4.8vw, 42px);
      line-height: 1.18;
    }

    .audio-line {
      display: none;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin: 12px 0 2px;
    }

    .audio-line.active { display: flex; }

    .audio-note {
      color: var(--muted);
      font-size: 13px;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 16px;
    }

    .answer {
      min-height: 66px;
      padding: 12px;
      text-align: left;
      background: var(--paper);
      color: var(--dark);
      font-size: 18px;
      font-weight: 900;
    }

    .answer.correct { background: var(--green); color: var(--dark); }
    .answer.wrong { background: var(--red); color: white; }

    .feedback {
      min-height: 52px;
      margin-top: 14px;
      padding: 12px;
      border: 2px dashed rgba(69, 215, 255, 0.42);
      border-radius: var(--radius);
      color: #e9f5ff;
      line-height: 1.55;
    }

    .modal-actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    @media (max-width: 900px) {
      .topbar, .hero { grid-template-columns: 1fr; }
      .tabs { justify-content: flex-start; }
      .grid, .revive-list { grid-template-columns: repeat(2, 1fr); }
      .ops { min-height: 540px; }
      .ops::before { width: 280px; height: 215px; }
    }

    @media (max-width: 570px) {
      .app { width: min(100% - 18px, 1220px); padding-top: 12px; }
      .brand { align-items: flex-start; }
      .patch { width: 50px; height: 50px; font-size: 17px; }
      .ops { padding: 16px; min-height: 680px; }
      .stats, .grid, .revive-list, .answers { grid-template-columns: 1fr; }
      .parent-row { grid-template-columns: 1fr; }
      .operator { grid-template-columns: 72px 1fr; }
      .helmet { height: 72px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="patch">CODY</div>
        <div>
          <h1>Cody星球闯三关</h1>
          <p class="subtitle">数学、语文、英语三科任务；错题倒地，看讲解，改正后复活再开一局。</p>
        </div>
      </div>
      <nav class="tabs" aria-label="页面">
        <button class="tab active" data-view="home">行动基地</button>
        <button class="tab" data-view="revive">复活站</button>
        <button class="tab" data-view="parent">家长雷达</button>
      </nav>
    </header>

    <section class="hero">
      <div class="ops">
        <div class="hero-copy">
          <div class="kicker">三科期末 · 每天30分钟</div>
          <h2>先闯三关，再复活补弱点。</h2>
          <p>每关 5 道题：数学打基础、语文抓阅读和字词、英语带音频训练。英语音频优先播放网页内置音频文件，失败时自动切换浏览器英文朗读，适配手机、电脑、iPad、Mac 和 Windows。</p>
          <div class="hero-actions">
            <button class="btn primary" id="startToday">开始今日三关</button>
            <button class="btn safe" id="reviveBtn">复活再玩一局</button>
            <button class="btn ghost" data-jump="parent">看家长建议</button>
          </div>
          <div class="stats">
            <div class="stat"><strong id="todayDone">0/3</strong><span>今日三关</span></div>
            <div class="stat"><strong id="downedCount">0</strong><span>倒地题</span></div>
            <div class="stat"><strong id="streakCount">1</strong><span>连续天数</span></div>
          </div>
        </div>
      </div>

      <aside class="status">
        <div class="operator">
          <div class="helmet"></div>
          <div>
            <div class="level">Lv.<span id="level">3</span> 三科行动队员</div>
            <p class="subtitle">距离下一等级还差 <span id="nextXp">80</span> 能量</p>
            <div class="bar"><i id="xpBar"></i></div>
          </div>
        </div>
        <h3>三科掌握度</h3>
        <div class="ability" id="abilities"></div>
      </aside>
    </section>

    <main>
      <section class="view active" id="home">
        <div class="grid" id="questGrid"></div>
      </section>
      <section class="view" id="revive">
        <div class="revive-list" id="reviveList"></div>
      </section>
      <section class="view" id="parent">
        <div class="parent" id="parentPanel"></div>
      </section>
    </main>
  </div>

  <div class="modal" id="questModal" role="dialog" aria-modal="true" aria-labelledby="questionTitle">
    <div class="modal-card">
      <div class="question-head">
        <div>
          <div class="tag" id="questTag">行动任务</div>
          <h2 class="question-title" id="questionTitle">题目</h2>
          <div class="audio-line" id="audioLine">
            <button class="btn safe" id="playAudio">播放音频</button>
            <span class="audio-note" id="audioNote">优先播放内置音频，失败时自动朗读。</span>
          </div>
        </div>
        <button class="small" id="closeModal">撤离</button>
      </div>
      <div class="bar"><i id="questionProgress"></i></div>
      <div class="answers" id="answers"></div>
      <div class="feedback" id="feedback">选一个答案。错题会进入复活站，看讲解并改正后才能复活。</div>
      <div class="modal-actions">
        <button class="btn ghost" id="showHint">战术提示</button>
        <button class="btn primary" id="nextQuestion">下一题</button>
      </div>
    </div>
  </div>

  <script>
    const subjects = [
      {
        id: "math",
        title: "数学突击关",
        tag: "第一关",
        skill: "计算与应用",
        color: "#45d7ff",
        desc: "分数、因数倍数、长方体正方体，先清基础丢分点。",
        questions: [
          { q: "12 和 18 的最大公因数是？", a: "6", options: ["3", "6", "12", "36"], hint: "列出共同因数，最大的是 6。", explain: "12 的因数有 1、2、3、4、6、12；18 的因数有 1、2、3、6、9、18。共同因数里最大的是 6。" },
          { q: "3/8 + 1/4 = ?", a: "5/8", options: ["4/12", "1/2", "5/8", "3/10"], hint: "先把 1/4 通分成 2/8。", explain: "异分母分数相加先通分。1/4 = 2/8，所以 3/8 + 2/8 = 5/8。" },
          { q: "长方体长 8cm、宽 5cm、高 3cm，体积是？", a: "120cm³", options: ["16cm³", "40cm³", "120cm³", "240cm³"], hint: "体积 = 长 × 宽 × 高。", explain: "长方体体积公式 V=abh，8×5×3=120，单位是 cm³。" },
          { q: "正方体棱长 4cm，表面积是？", a: "96cm²", options: ["16cm²", "64cm²", "96cm²", "24cm²"], hint: "一个面是 4×4，再乘 6。", explain: "正方体有 6 个相同的面，一个面面积 16cm²，6 个面是 96cm²。" },
          { q: "1 立方分米等于多少立方厘米？", a: "1000cm³", options: ["10cm³", "100cm³", "1000cm³", "10000cm³"], hint: "1dm=10cm，体积要乘三次。", explain: "1dm³ = 10cm×10cm×10cm = 1000cm³。" }
        ]
      },
      {
        id: "chinese",
        title: "语文侦察关",
        tag: "第二关",
        skill: "字词与阅读",
        color: "#ffbd4a",
        desc: "字词、修辞、阅读理解，训练考试里最常见的判断题。",
        questions: [
          { q: "“聚精会神”的意思最接近哪一个？", a: "注意力非常集中", options: ["动作很快", "注意力非常集中", "声音很大", "心情很难过"], hint: "关键词是“聚精”和“会神”。", explain: "聚精会神表示集中全部精神，形容注意力非常集中。" },
          { q: "“弯弯的月亮像小船”使用了什么修辞？", a: "比喻", options: ["拟人", "排比", "比喻", "夸张"], hint: "把月亮比作小船。", explain: "句子里把一种事物说成另一种相似的事物，这是比喻。" },
          { q: "阅读题里问“这段主要写什么”，通常要找什么？", a: "中心意思", options: ["标点符号", "中心意思", "生字数量", "作者年龄"], hint: "问主要内容，就是找中心。", explain: "概括段落主要内容时，要抓中心句、关键词和事情的起因经过结果。" },
          { q: "下面哪个词语有错别字？", a: "再接再励", options: ["坚持不懈", "再接再励", "全神贯注", "恍然大悟"], hint: "正确写法是“再接再厉”。", explain: "“再接再厉”的“厉”表示努力、奋勉，不是鼓励的“励”。" },
          { q: "作文结尾最重要的作用是？", a: "点明中心", options: ["增加字数", "点明中心", "随便收尾", "只写天气"], hint: "好结尾要收住主题。", explain: "作文结尾常用来总结全文、点明中心、升华感受，让文章更完整。" }
        ]
      },
      {
        id: "english",
        title: "英语通讯关",
        tag: "第三关",
        skill: "听读与句型",
        color: "#9b7cff",
        desc: "带音频按钮，训练单词、句型、阅读判断和听读反应。",
        questions: [
          { q: "听音频，选择你听到的单词。", a: "apple", options: ["apple", "table", "people", "pencil"], hint: "注意开头音 /æ/。", explain: "音频读的是 apple，意思是苹果。", audio: "audio/eng-apple.wav", speak: "apple" },
          { q: "听音频，句子里的地点是哪里？", a: "library", options: ["park", "library", "classroom", "kitchen"], hint: "听 I go to the ...", explain: "句子是 I go to the library on Sunday. 地点是 library。", audio: "audio/eng-library.wav", speak: "I go to the library on Sunday." },
          { q: "He is running on the playground. 这句话是什么时态？", a: "现在进行时", options: ["一般现在时", "现在进行时", "一般过去时", "将来时"], hint: "is + 动词 ing。", explain: "is running 是 be doing 结构，表示现在进行时。", audio: "audio/eng-running.wav", speak: "He is running on the playground." },
          { q: "听音频，问题在问什么？", a: "早餐想吃什么", options: ["几点起床", "早餐想吃什么", "天气怎么样", "喜欢什么颜色"], hint: "What would you like for breakfast?", explain: "What would you like for breakfast? 意思是早餐你想要什么。", audio: "audio/eng-breakfast.wav", speak: "What would you like for breakfast?" },
          { q: "It is sunny and warm today. 天气怎么样？", a: "晴朗暖和", options: ["下雨寒冷", "晴朗暖和", "多云有风", "下雪"], hint: "sunny 是晴朗，warm 是暖和。", explain: "sunny and warm 表示晴朗并且暖和。", audio: "audio/eng-weather.wav", speak: "It is sunny and warm today." }
        ]
      }
    ];

    const state = {
      xp: 140,
      level: 3,
      streak: 1,
      completed: {},
      downed: [],
      currentSubject: null,
      index: 0,
      score: 0,
      answered: false
    };

    const abilityBase = { "数学": 36, "语文": 32, "英语": 28 };
    const $ = (id) => document.getElementById(id);
    const activeDowned = () => state.downed.filter(item => !item.corrected);

    function render() {
      $("streakCount").textContent = state.streak;
      $("level").textContent = state.level;
      $("nextXp").textContent = Math.max(0, 220 - state.xp);
      $("xpBar").style.width = Math.min(100, state.xp / 220 * 100) + "%";
      $("todayDone").textContent = `${Object.keys(state.completed).length}/3`;
      $("downedCount").textContent = activeDowned().length;
      $("reviveBtn").disabled = activeDowned().length > 0;
      $("reviveBtn").textContent = activeDowned().length > 0 ? "先清倒地题" : "复活再玩一局";
      renderAbilities();
      renderQuests();
      renderRevive();
      renderParent();
    }

    function renderAbilities() {
      const bonus = Object.keys(state.completed).length * 6;
      const penalty = Math.min(12, activeDowned().length * 3);
      $("abilities").innerHTML = Object.entries(abilityBase).map(([name, base]) => {
        const value = Math.max(8, Math.min(99, base + bonus - penalty));
        return `
          <div class="ability-row">
            <b>${name}</b>
            <div class="bar"><i style="width:${value}%; background:${value > 45 ? "linear-gradient(90deg, var(--green), var(--cyan))" : "linear-gradient(90deg, var(--orange), var(--amber))"}"></i></div>
            <span>${value}</span>
          </div>
        `;
      }).join("");
    }

    function questCard(s) {
      const locked = activeDowned().length > 0;
      const done = state.completed[s.id];
      return `
        <article class="card ${locked ? "locked" : ""}" style="--accent:${s.color}">
          <span class="tag">${done ? "已通关" : s.tag}</span>
          <h3>${s.title}</h3>
          <p>${s.desc}</p>
          <footer>
            <b>${s.skill}</b>
            <button class="small" ${locked ? "disabled" : ""} data-subject="${s.id}">${locked ? "需复活" : done ? "再开一局" : "出任务"}</button>
          </footer>
        </article>
      `;
    }

    function renderQuests() {
      $("questGrid").innerHTML = subjects.map(questCard).join("");
      document.querySelectorAll("[data-subject]").forEach(btn => {
        btn.addEventListener("click", () => startSubject(btn.dataset.subject));
      });
    }

    function renderRevive() {
      if (!state.downed.length) {
        $("reviveList").innerHTML = `
          <div class="revive-card">
            <h3>复活站空闲</h3>
            <p>做错的题会进入这里。先看“讲解+正确答案”，英语题也可以重听音频；点“我已改正”后，全部清空才能复活再玩一局。</p>
          </div>
        `;
        return;
      }
      $("reviveList").innerHTML = state.downed.map((item, idx) => `
        <article class="revive-card ${item.seen ? "seen" : ""} ${item.corrected ? "done" : ""}">
          <span class="tag">${item.corrected ? "已复活" : "倒地题"}</span>
          <h3>${item.subjectTitle}</h3>
          <p><b>题目：</b>${item.q}</p>
          <p><b>你的答案：</b>${item.wrong}　<b>正确答案：</b>${item.a}</p>
          <div class="briefing">
            <b>讲解：</b>${item.explain}<br>
            <b>正确答案：</b>${item.a}
          </div>
          ${item.audio ? `<button class="small" data-replay="${idx}">重听音频</button>` : ""}
          <button class="small" data-video="${idx}">${item.seen ? "重看讲解" : "看讲解+正确答案"}</button>
          <button class="small" data-correct="${idx}" ${item.seen && !item.corrected ? "" : "disabled"}>我已改正，申请复活</button>
        </article>
      `).join("");
      document.querySelectorAll("[data-video]").forEach(btn => {
        btn.addEventListener("click", () => {
          state.downed[Number(btn.dataset.video)].seen = true;
          render();
        });
      });
      document.querySelectorAll("[data-correct]").forEach(btn => {
        btn.addEventListener("click", () => {
          const item = state.downed[Number(btn.dataset.correct)];
          if (!item.seen) return;
          item.corrected = true;
          state.xp += 10;
          render();
        });
      });
      document.querySelectorAll("[data-replay]").forEach(btn => {
        btn.addEventListener("click", () => {
          const item = state.downed[Number(btn.dataset.replay)];
          playPromptAudio(item);
        });
      });
    }

    function renderParent() {
      const done = Object.keys(state.completed).length;
      const needs = activeDowned();
      const focus = needs[0]?.subjectTitle || "暂无倒地题";
      $("parentPanel").innerHTML = `
        <div class="parent-row">
          <div><h3>今日三关节奏</h3><p>建议每天数学、语文、英语各 1 关，每关 5 题。总时长 30 分钟以内，完成后再给娱乐时间。</p></div>
          <div class="score">${done}/3</div>
        </div>
        <div class="parent-row">
          <div><h3>复活机制</h3><p>只要有错题未改正，就不能继续开局。这样可以把“输一局”转成“复盘一局”，更容易补基础。</p></div>
          <div class="score">${needs.length}</div>
        </div>
        <div class="parent-row">
          <div><h3>当前最该补</h3><p>${needs.length ? "先处理这个倒地题，再进入下一局。" : "可以开始新一轮三科任务。"}</p></div>
          <div class="score">${focus}</div>
        </div>
      `;
    }

    function startSubject(id) {
      if (activeDowned().length > 0) {
        document.querySelector('.tab[data-view="revive"]').click();
        return;
      }
      const subject = subjects.find(s => s.id === id);
      if (!subject) return;
      state.currentSubject = subject;
      state.index = 0;
      state.score = 0;
      state.answered = false;
      $("questModal").classList.add("open");
      showQuestion();
    }

    function showQuestion() {
      const subject = state.currentSubject;
      const question = subject.questions[state.index];
      state.answered = false;
      $("questTag").textContent = subject.title;
      $("questionTitle").textContent = question.q;
      $("questionProgress").style.width = `${state.index / subject.questions.length * 100}%`;
      $("feedback").textContent = "选一个答案。错题会进入复活站，看讲解并改正后才能复活。";
      $("answers").innerHTML = question.options.map(opt => `<button class="answer" data-answer="${opt}">${opt}</button>`).join("");
      $("audioLine").classList.toggle("active", Boolean(question.audio || question.speak));
      $("audioNote").textContent = question.audio ? "优先播放内置音频，失败时自动朗读。" : "使用浏览器英文朗读。";
      document.querySelectorAll(".answer").forEach(btn => {
        btn.addEventListener("click", () => answer(btn.dataset.answer, btn));
      });
    }

    function playPromptAudio(question) {
      if (!question) return;
      if (question.audio) {
        const audio = new Audio(question.audio);
        audio.preload = "auto";
        audio.play().catch(() => speakFallback(question.speak || question.q));
        return;
      }
      speakFallback(question.speak || question.q);
    }

    function speakFallback(text) {
      if (!("speechSynthesis" in window)) {
        $("feedback").textContent = "当前浏览器不支持朗读，请查看题目文字。";
        return;
      }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = 0.88;
      const voices = window.speechSynthesis.getVoices();
      const enVoice = voices.find(v => /en[-_](US|GB)/i.test(v.lang)) || voices.find(v => /^en/i.test(v.lang));
      if (enVoice) utterance.voice = enVoice;
      window.speechSynthesis.speak(utterance);
    }

    function answer(value, btn) {
      if (state.answered) return;
      state.answered = true;
      const question = state.currentSubject.questions[state.index];
      const correct = value === question.a;
      document.querySelectorAll(".answer").forEach(b => {
        if (b.dataset.answer === question.a) b.classList.add("correct");
      });
      if (correct) {
        state.score += 1;
        state.xp += 12;
        $("feedback").textContent = "命中目标！能量 +12。";
      } else {
        btn.classList.add("wrong");
        const key = `${state.currentSubject.id}-${state.index}`;
        if (!state.downed.some(item => item.key === key && !item.corrected)) {
          state.downed.push({
            key,
            subjectTitle: state.currentSubject.title,
            q: question.q,
            a: question.a,
            wrong: value,
            explain: question.explain,
            audio: question.audio,
            speak: question.speak,
            seen: false,
            corrected: false
          });
        }
        $("feedback").textContent = `队员倒地：这题已进入复活站。提示：${question.hint}`;
      }
      render();
    }

    function nextQuestion() {
      if (!state.currentSubject) return;
      if (state.index < state.currentSubject.questions.length - 1) {
        state.index += 1;
        showQuestion();
      } else {
        finishSubject();
      }
    }

    function finishSubject() {
      const subject = state.currentSubject;
      state.completed[subject.id] = true;
      if (state.score >= 4) {
        state.xp += 30;
        $("feedback").textContent = `成功通关！本关 ${state.score}/5，额外能量 +30。`;
      } else {
        $("feedback").textContent = `完成行动，本关 ${state.score}/5。先去复活站清倒地题，再开下一局。`;
      }
      if (state.xp >= 220) {
        state.level += 1;
        state.xp -= 220;
      }
      state.currentSubject = null;
      $("questionProgress").style.width = "100%";
      setTimeout(() => {
        $("questModal").classList.remove("open");
        render();
        if (activeDowned().length > 0) document.querySelector('.tab[data-view="revive"]').click();
      }, 900);
    }

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
        tab.classList.add("active");
        $(tab.dataset.view).classList.add("active");
      });
    });

    document.querySelectorAll("[data-jump]").forEach(btn => {
      btn.addEventListener("click", () => document.querySelector(`.tab[data-view="${btn.dataset.jump}"]`).click());
    });

    $("startToday").addEventListener("click", () => {
      const next = subjects.find(s => !state.completed[s.id]) || subjects[0];
      startSubject(next.id);
    });

    $("reviveBtn").addEventListener("click", () => {
      if (activeDowned().length > 0) {
        document.querySelector('.tab[data-view="revive"]').click();
      } else {
        startSubject(subjects[0].id);
      }
    });

    $("closeModal").addEventListener("click", () => $("questModal").classList.remove("open"));
    $("nextQuestion").addEventListener("click", nextQuestion);
    $("showHint").addEventListener("click", () => {
      if (!state.currentSubject) return;
      $("feedback").textContent = state.currentSubject.questions[state.index].hint;
    });
    $("playAudio").addEventListener("click", () => {
      if (!state.currentSubject) return;
      playPromptAudio(state.currentSubject.questions[state.index]);
    });

    if ("speechSynthesis" in window) {
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

    render();
  </script>
</body>
</html>
