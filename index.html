<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Cody星球闯三关</title>
  <style>
    :root {
      --bg: #07111f;
      --panel: rgba(12, 23, 38, 0.94);
      --panel-2: rgba(16, 31, 52, 0.94);
      --paper: #eef6ff;
      --text: #f7fbff;
      --muted: #9eb4cc;
      --dark: #07111f;
      --cyan: #45d7ff;
      --ice: #88f4ff;
      --orange: #ff7a2f;
      --amber: #ffbd4a;
      --red: #ff4054;
      --green: #54f0a0;
      --purple: #9b7cff;
      --radius: 7px;
      --shadow: 0 22px 56px rgba(0, 0, 0, 0.48);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Microsoft YaHei", "Trebuchet MS", sans-serif;
      background:
        radial-gradient(circle at 16% 10%, rgba(69, 215, 255, 0.18), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(255, 122, 47, 0.18), transparent 25%),
        linear-gradient(145deg, #07111f 0%, #10243d 54%, #1e1a31 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.3;
      background-image:
        linear-gradient(90deg, rgba(69, 215, 255, 0.13) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255, 189, 74, 0.10) 1px, transparent 1px),
        repeating-linear-gradient(135deg, transparent 0 28px, rgba(255, 122, 47, 0.08) 28px 34px);
      background-size: 46px 46px, 46px 46px, 128px 128px;
    }

    button { font: inherit; }
    h1, h2, h3, p { margin: 0; }

    .app {
      position: relative;
      width: min(1220px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 36px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .patch {
      width: 62px;
      height: 62px;
      display: grid;
      place-items: center;
      border: 3px solid #000;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--cyan), var(--amber));
      color: var(--dark);
      box-shadow: 5px 5px 0 #000, 0 0 28px rgba(69, 215, 255, 0.35);
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: 20px;
      transform: skew(-4deg);
    }

    h1 {
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: clamp(32px, 5vw, 64px);
      line-height: 0.96;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 7px;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .tab, .btn, .small, .answer {
      min-height: 42px;
      border: 2px solid #000;
      border-radius: var(--radius);
      background: #13243a;
      color: var(--text);
      box-shadow: 3px 3px 0 #000;
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, filter 140ms ease;
    }

    .tab { padding: 9px 12px; }
    .btn { padding: 11px 15px; font-weight: 900; }
    .small { min-height: 34px; padding: 7px 10px; font-weight: 900; }

    .tab:hover, .btn:hover, .small:hover, .answer:hover {
      transform: translate(-1px, -1px);
      box-shadow: 5px 5px 0 #000;
      filter: brightness(1.08);
    }

    .tab.active, .btn.safe {
      background: var(--cyan);
      color: var(--dark);
      font-weight: 900;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--orange), var(--amber));
      color: var(--dark);
    }

    .btn.ghost {
      background: var(--paper);
      color: var(--dark);
    }

    .btn:disabled, .small:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: grayscale(0.8);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.16fr 0.84fr;
      gap: 15px;
    }

    .ops, .status, .card, .revive-card, .parent-row, .modal-card {
      border: 3px solid #000;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      background: var(--panel);
    }

    .ops {
      position: relative;
      min-height: 455px;
      padding: 24px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255,255,255,0.01)),
        repeating-linear-gradient(90deg, rgba(69, 215, 255, 0.08) 0 8px, transparent 8px 24px),
        #101a2a;
    }

    .ops::before {
      content: "";
      position: absolute;
      right: -36px;
      bottom: -36px;
      width: 380px;
      height: 270px;
      border: 4px solid #000;
      border-radius: 12px;
      background:
        linear-gradient(90deg, transparent 0 18%, rgba(136, 244, 255, 0.9) 18% 25%, transparent 25% 75%, rgba(136, 244, 255, 0.9) 75% 82%, transparent 82%),
        radial-gradient(circle at 50% 32%, var(--amber) 0 16%, transparent 17%),
        linear-gradient(145deg, #536b88, #132135 62%, #07111f);
      clip-path: polygon(12% 0, 88% 0, 100% 28%, 90% 100%, 10% 100%, 0 28%);
      box-shadow: inset -30px -22px 0 rgba(0,0,0,0.32), 10px 10px 0 #000, 0 0 46px rgba(69, 215, 255, 0.26);
      animation: drone 4.2s ease-in-out infinite;
    }

    .ops::after {
      content: "CODY ORBIT";
      position: absolute;
      left: 24px;
      bottom: 18px;
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: clamp(42px, 7vw, 92px);
      color: rgba(69, 215, 255, 0.08);
      pointer-events: none;
    }

    @keyframes drone {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-9px) rotate(1deg); }
    }

    .hero-copy {
      position: relative;
      z-index: 1;
      max-width: 630px;
    }

    .kicker {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 7px 10px;
      border: 2px solid #000;
      border-radius: 999px;
      background: var(--cyan);
      color: var(--dark);
      font-weight: 900;
      margin-bottom: 17px;
    }

    .hero-copy h2 {
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: clamp(38px, 6vw, 82px);
      line-height: 0.94;
      letter-spacing: 0;
    }

    .hero-copy p {
      max-width: 560px;
      margin-top: 18px;
      color: #d6e4f2;
      font-size: 17px;
      line-height: 1.68;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 540px;
      margin-top: 25px;
    }

    .stat {
      border: 2px solid #000;
      border-radius: var(--radius);
      padding: 12px;
      background: rgba(3, 7, 13, 0.72);
    }

    .stat strong {
      display: block;
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: 28px;
      line-height: 1;
      color: var(--cyan);
    }

    .stat span { color: var(--muted); font-size: 13px; }

    .status { padding: 18px; }

    .operator {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 14px;
      align-items: center;
      margin-bottom: 15px;
    }

    .helmet {
      height: 92px;
      border: 3px solid #000;
      border-radius: 14px;
      background:
        radial-gradient(circle at 34% 42%, var(--ice) 0 6px, transparent 7px),
        radial-gradient(circle at 66% 42%, var(--ice) 0 6px, transparent 7px),
        linear-gradient(90deg, transparent 0 27%, var(--cyan) 27% 73%, transparent 73%),
        linear-gradient(135deg, #536b88, #101a2a);
      box-shadow: 5px 5px 0 #000, 0 0 24px rgba(69, 215, 255, 0.24);
    }

    .level { font-size: 24px; font-weight: 900; }

    .bar {
      height: 16px;
      border: 2px solid #000;
      border-radius: 999px;
      overflow: hidden;
      background: #07111f;
      margin-top: 8px;
    }

    .bar > i {
      display: block;
      height: 100%;
      width: 34%;
      background: linear-gradient(90deg, var(--cyan), var(--amber));
    }

    .ability { display: grid; gap: 10px; margin-top: 14px; }

    .ability-row {
      display: grid;
      grid-template-columns: 76px 1fr 42px;
      gap: 9px;
      align-items: center;
      font-size: 14px;
    }

    main { margin-top: 15px; }
    .view { display: none; }
    .view.active { display: block; animation: rise 240ms ease both; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .planet-map {
      min-height: 560px;
      position: relative;
      display: grid;
      place-items: center;
      overflow: hidden;
      border: 3px solid #000;
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 50% 50%, rgba(69, 215, 255, 0.15), transparent 28%),
        radial-gradient(circle at 18% 22%, rgba(255, 189, 74, 0.16), transparent 16%),
        radial-gradient(circle at 84% 28%, rgba(155, 124, 255, 0.16), transparent 18%),
        linear-gradient(145deg, rgba(10, 21, 36, 0.96), rgba(9, 15, 28, 0.98));
      box-shadow: var(--shadow);
    }

    .orbit-ring {
      position: absolute;
      width: min(72vw, 760px);
      height: min(72vw, 760px);
      max-width: 760px;
      max-height: 760px;
      border: 2px dashed rgba(136, 244, 255, 0.28);
      border-radius: 50%;
      transform: rotate(-11deg);
      pointer-events: none;
    }

    .orbit-ring.second {
      width: min(52vw, 560px);
      height: min(52vw, 560px);
      opacity: 0.78;
      transform: rotate(18deg);
    }

    .ship-core {
      position: relative;
      z-index: 2;
      width: 210px;
      min-height: 168px;
      display: grid;
      place-items: center;
      text-align: center;
      border: 3px solid #000;
      border-radius: 18px;
      background:
        linear-gradient(90deg, transparent 0 17%, rgba(136, 244, 255, 0.88) 17% 25%, transparent 25% 75%, rgba(136, 244, 255, 0.88) 75% 83%, transparent 83%),
        radial-gradient(circle at 50% 34%, var(--amber) 0 15%, transparent 16%),
        linear-gradient(145deg, #536b88, #132135 62%, #07111f);
      clip-path: polygon(12% 0, 88% 0, 100% 28%, 90% 100%, 10% 100%, 0 28%);
      box-shadow: inset -22px -18px 0 rgba(0,0,0,0.24), 9px 9px 0 #000, 0 0 44px rgba(69, 215, 255, 0.28);
    }

    .ship-core strong {
      display: block;
      margin-top: 18px;
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: 32px;
      color: var(--paper);
    }

    .ship-core span {
      display: block;
      color: #c8d8e9;
      font-size: 13px;
      padding: 0 18px;
      line-height: 1.4;
    }

    .planet-card {
      position: absolute;
      z-index: 3;
      width: 230px;
      min-height: 230px;
      display: grid;
      place-items: center;
      text-align: center;
      border: 3px solid #000;
      border-radius: 50%;
      padding: 22px;
      background:
        radial-gradient(circle at 34% 26%, rgba(255,255,255,0.5), transparent 17%),
        radial-gradient(circle at 68% 68%, rgba(0,0,0,0.2), transparent 25%),
        var(--accent, var(--cyan));
      color: #07111f;
      box-shadow: 8px 8px 0 #000, 0 0 34px color-mix(in srgb, var(--accent, var(--cyan)) 42%, transparent);
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
    }

    .planet-card:hover {
      transform: translate(-2px, -4px) scale(1.03);
      box-shadow: 11px 11px 0 #000, 0 0 46px color-mix(in srgb, var(--accent, var(--cyan)) 56%, transparent);
      filter: saturate(1.06);
    }

    .planet-card.locked {
      filter: grayscale(0.75);
      opacity: 0.72;
      cursor: not-allowed;
    }

    .planet-card.math { left: 7%; top: 13%; }
    .planet-card.chinese { right: 7%; top: 17%; }
    .planet-card.english { left: 50%; bottom: 7%; transform: translateX(-50%); }
    .planet-card.english:hover { transform: translate(-50%, -4px) scale(1.03); }

    .planet-card .tag {
      background: rgba(255,255,255,0.8);
      margin-bottom: 8px;
    }

    .planet-card h3 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .planet-card p {
      color: rgba(7, 17, 31, 0.78);
      font-size: 13px;
      line-height: 1.45;
      margin-bottom: 12px;
    }

    .planet-card .small {
      background: rgba(238, 246, 255, 0.92);
      color: #07111f;
    }

    .card {
      min-height: 205px;
      padding: 15px;
      overflow: hidden;
      position: relative;
      background: var(--panel-2);
    }

    .card::after {
      content: "";
      position: absolute;
      right: -38px;
      bottom: -48px;
      width: 136px;
      height: 136px;
      border: 3px solid #000;
      border-radius: 50%;
      background: var(--accent, var(--cyan));
      opacity: 0.72;
    }

    .tag {
      display: inline-block;
      border: 2px solid #000;
      border-radius: 999px;
      padding: 4px 8px;
      background: var(--accent, var(--cyan));
      color: var(--dark);
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 11px;
    }

    .card h3 {
      position: relative;
      z-index: 1;
      font-size: 22px;
      margin-bottom: 8px;
    }

    .card p {
      position: relative;
      z-index: 1;
      color: #c7d7e8;
      font-size: 14px;
      line-height: 1.52;
    }

    .card footer {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 16px;
    }

    .revive-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .revive-card {
      padding: 14px;
      background: var(--panel);
    }

    .revive-card.done {
      background: rgba(20, 47, 64, 0.94);
    }

    .revive-card h3 { font-size: 20px; margin-bottom: 8px; }

    .revive-card p {
      color: #c7d7e8;
      line-height: 1.5;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .briefing {
      display: none;
      border: 2px dashed rgba(69, 215, 255, 0.4);
      border-radius: var(--radius);
      padding: 10px;
      margin: 10px 0;
      color: #edf7ff;
      line-height: 1.55;
      background: rgba(0,0,0,0.2);
    }

    .revive-card.seen .briefing { display: block; }

    .parent {
      display: grid;
      gap: 12px;
    }

    .parent-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 15px;
    }

    .parent-row p {
      color: #c7d7e8;
      margin-top: 5px;
      line-height: 1.5;
    }

    .score {
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: 30px;
      color: var(--cyan);
      white-space: nowrap;
    }

    .progress-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .progress-chip {
      border: 2px solid #000;
      border-radius: var(--radius);
      padding: 10px;
      background: rgba(7, 17, 31, 0.58);
    }

    .progress-chip b {
      display: block;
      color: var(--text);
      margin-bottom: 4px;
    }

    .progress-chip span {
      color: var(--muted);
      font-size: 13px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .day-cell {
      border: 2px solid #000;
      border-radius: var(--radius);
      padding: 10px 8px;
      background: rgba(7, 17, 31, 0.62);
      min-height: 82px;
    }

    .day-cell b {
      display: block;
      color: var(--text);
      margin-bottom: 5px;
    }

    .day-cell span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .day-cell.complete {
      background: rgba(84, 240, 160, 0.22);
    }

    .day-cell.partial {
      background: rgba(255, 189, 74, 0.20);
    }

    .day-cell.missed {
      background: rgba(255, 64, 84, 0.18);
    }

    .day-cell.today {
      outline: 3px solid var(--cyan);
      box-shadow: 0 0 24px rgba(69, 215, 255, 0.20);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.76);
    }

    .modal.open { display: grid; }

    .modal-card {
      width: min(820px, 100%);
      padding: 20px;
    }

    .question-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }

    .question-title {
      font-size: clamp(24px, 4.8vw, 42px);
      line-height: 1.18;
    }

    .audio-line {
      display: none;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin: 12px 0 2px;
    }

    .audio-line.active { display: flex; }

    .audio-note {
      color: var(--muted);
      font-size: 13px;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 16px;
    }

    .answer {
      min-height: 66px;
      padding: 12px;
      text-align: left;
      background: var(--paper);
      color: var(--dark);
      font-size: 18px;
      font-weight: 900;
    }

    .answer.correct { background: var(--green); color: var(--dark); }
    .answer.wrong { background: var(--red); color: white; }

    .feedback {
      min-height: 52px;
      margin-top: 14px;
      padding: 12px;
      border: 2px dashed rgba(69, 215, 255, 0.42);
      border-radius: var(--radius);
      color: #e9f5ff;
      line-height: 1.55;
    }

    .modal-actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    @media (max-width: 900px) {
      .topbar, .hero { grid-template-columns: 1fr; }
      .tabs { justify-content: flex-start; }
      .grid, .revive-list { grid-template-columns: repeat(2, 1fr); }
      .planet-map { min-height: 720px; }
      .planet-card.math { left: 4%; top: 8%; }
      .planet-card.chinese { right: 4%; top: 13%; }
      .planet-card.english { bottom: 6%; }
      .ops { min-height: 540px; }
      .ops::before { width: 280px; height: 215px; }
    }

    @media (max-width: 570px) {
      .app { width: min(100% - 18px, 1220px); padding-top: 12px; }
      .brand { align-items: flex-start; }
      .patch { width: 50px; height: 50px; font-size: 17px; }
      .ops { padding: 16px; min-height: 680px; }
      .stats, .grid, .revive-list, .answers { grid-template-columns: 1fr; }
      .progress-grid { grid-template-columns: 1fr; }
      .calendar-grid { grid-template-columns: repeat(2, 1fr); }
      .planet-map {
        min-height: auto;
        display: grid;
        gap: 14px;
        padding: 16px;
      }
      .orbit-ring { display: none; }
      .ship-core, .planet-card, .planet-card.math, .planet-card.chinese, .planet-card.english {
        position: relative;
        left: auto;
        right: auto;
        top: auto;
        bottom: auto;
        transform: none;
        width: 100%;
        min-height: 150px;
        border-radius: var(--radius);
      }
      .planet-card.english:hover { transform: translate(-2px, -4px) scale(1.02); }
      .parent-row { grid-template-columns: 1fr; }
      .operator { grid-template-columns: 72px 1fr; }
      .helmet { height: 72px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="patch">CODY</div>
        <div>
          <h1>Cody星球闯三关</h1>
          <p class="subtitle">数学、语文、英语三科任务；错题倒地，看讲解，改正后复活再开一局。</p>
        </div>
      </div>
      <nav class="tabs" aria-label="页面">
        <button class="tab active" data-view="home">星球地图</button>
        <button class="tab" data-view="revive">陨石坑复活站</button>
        <button class="tab" data-view="parent">家长雷达</button>
      </nav>
    </header>

    <section class="hero">
      <div class="ops">
        <div class="hero-copy">
          <div class="kicker">三科期末 · 每天30分钟</div>
          <h2>选择星球，开始闯关。</h2>
          <p>每天按考前小测来打：20题混合训练，数学、语文、英语一起出击；语文加入阅读和诗词，英语加入短文阅读和综合语法，错题清空才算今日达标。</p>
          <div class="hero-actions">
            <button class="btn primary" id="startToday">今日20题小测</button>

        { q: "Which is correct for past tense?", a: "I saw a film yesterday.", options: ["I see a film yesterday.", "I saw a film yesterday.", "I seeing a film yesterday.", "I sees a film yesterday."], hint: "see 的过去式 saw。", explain: "yesterday 用过去式，see 变 saw。" },
        { q: "Which one means “我打算明天去游泳”？", a: "I am going to swim tomorrow.", options: ["I swam yesterday.", "I am going to swim tomorrow.", "I swim every day.", "I am swimming now."], hint: "be going to 表示打算。", explain: "am going to swim tomorrow 表示明天打算去游泳。" },
        { q: "The elephant is ____ than the monkey.", a: "bigger", options: ["big", "bigger", "biggest", "small"], hint: "than 前用比较级。", explain: "有 than 时常用比较级 bigger。" },
        { q: "This is ____ book. The book is mine.", a: "my", options: ["I", "me", "my", "mine"], hint: "名词 book 前用形容词性物主代词。", explain: "my book 表示我的书。" },
        { q: "The red pencil is ____. It belongs to Amy.", a: "hers", options: ["her", "hers", "she", "his"], hint: "后面没有名词。", explain: "表示“她的”且后面不接名词，用 hers。" },
        { q: "What does “No photos” mean?", a: "You can't take photos.", options: ["You can't take photos.", "You can run.", "You must eat.", "You can sing."], hint: "No + 名词表示禁止。", explain: "No photos 表示禁止拍照。" },
        { q: "Choose the best title: A text talks about planting trees, watering them and protecting the forest.", a: "Protect the Forest", options: ["My New Shoes", "Protect the Forest", "A Birthday Party", "At the Cinema"], hint: "抓主题词 trees、forest。", explain: "短文主题和种树、保护森林有关，所以标题应是 Protect the Forest。" }
      ]
    };

    const tierMeta = {
      secure: { label: "保分题", bonus: 10, mastery: 1 },
      improve: { label: "提分题", bonus: 12, mastery: 2 },
      stretch: { label: "冲90题", bonus: 16, mastery: 3 }
    };

    const mockTierPlan = {
      math: { secure: 3, improve: 3, stretch: 1 },
      chinese: { secure: 2, improve: 3, stretch: 2 },
      english: { secure: 3, improve: 2, stretch: 1 }
    };

    subjects.forEach(subject => {
      const extras = extraQuestionBank[subject.id] || [];
      subject.questions.push(...extras);
      applyQuestionTiers(subject);
      const stretchCount = subject.questions.filter(question => question.tier === "stretch").length;
      subject.skill = `${subject.questions.length}题 · ${stretchCount}道冲90`;
    });

    const QUESTIONS_PER_ROUND = 8;
    const MOCK_TEST_COUNT = 20;
    const mockSubjectPlan = { math: 7, chinese: 7, english: 6 };

    const pad2 = value => String(value).padStart(2, "0");
    const makeDateKey = date => `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
    const todayKey = makeDateKey(new Date());
    const planDates = Array.from({ length: 14 }, (_, index) => makeDateKey(new Date(2026, 5, 16 + index)));

    const state = {
      xp: 140,
      level: 3,
      streak: 1,
      loot: 0,
      date: todayKey,
      completed: {},
      downed: [],
      seenKeys: {},
      mastery: { math: 36, chinese: 32, english: 28 },
      mockDone: false,
      currentMode: "subject",
      currentSubject: null,
      currentQuestions: [],
      reviveItemIndex: null,
      combo: 0,
      index: 0,
      score: 0,
      answered: false
    };

    const abilityBase = { "数学": 36, "语文": 32, "英语": 28 };
    const $ = (id) => document.getElementById(id);
    const activeItems = items => (items || []).filter(item => !item.corrected);
    const activeDowned = () => activeItems(state.downed);
    const storageKey = `cody-planet-progress-${todayKey}`;

    function storageKeyFor(dateKey) {
      return `cody-planet-progress-${dateKey}`;
    }

    function applyQuestionTiers(subject) {
      subject.questions.forEach(question => {
        question.tier = question.tier || classifyQuestion(subject.id, question);
      });
    }

    function classifyQuestion(subjectId, question) {
      const text = `${question.q} ${question.hint || ""} ${question.explain || ""}`;
      if (subjectId === "math") {
        if (/鱼缸|盒子|至少|最多|扩大|实际|应用|混合|一根|还剩|单位|换算|最小的是|多步骤|无盖/.test(text)) return "stretch";
        if (/最大公因数|最小公倍数|通分|约分|比较|表面积|体积|分数|带分数|公倍数|公因数/.test(text)) return "improve";
        return "secure";
      }
      if (subjectId === "chinese") {
        if (/阅读：|诗句|表达了|体现了|作用|中心|作文|联系生活|详略|照应题目|主要写|为什么|人物|情感|赏析|题眼|开放/.test(text)) return "stretch";
        if (/修辞|描写|病句|关联词|句式|标点|古诗|默写|意思|近义词|反义词|词语|概括/.test(text)) return "improve";
        return "secure";
      }
      if (subjectId === "english") {
        if (/^Read:|best title|Which sentence|Make a question|Which one means|past tense|heavier|mustn't|No photos|belongs to|going to/.test(text)) return "stretch";
        if (/听音频|There|____|Choose|What should|birthday|party|than|doesn't|比较级|介词|时态|过去式/.test(text)) return "improve";
        return "secure";
      }
      return "secure";
    }

    function readProgressForDate(dateKey) {
      if (dateKey === todayKey) return state;
      try {
        const saved = JSON.parse(localStorage.getItem(storageKeyFor(dateKey)) || "null");
        return saved && saved.date === dateKey ? saved : { date: dateKey, completed: {}, downed: [] };
      } catch (error) {
        return { date: dateKey, completed: {}, downed: [] };
      }
    }

    function isDayComplete(progress) {
      const legacyComplete = Object.keys(progress.completed || {}).length === subjects.length;
      return (progress.mockDone || legacyComplete) && activeItems(progress.downed).length === 0;
    }

    function loadProgress() {
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey) || "null");
        if (!saved || saved.date !== todayKey) return;
        state.xp = saved.xp ?? state.xp;
        state.level = saved.level ?? state.level;
        state.streak = saved.streak ?? state.streak;
        state.loot = saved.loot ?? state.loot;
        state.completed = saved.completed || {};
        state.downed = saved.downed || [];
        state.seenKeys = saved.seenKeys || {};
        state.mastery = { ...state.mastery, ...(saved.mastery || {}) };
        state.mockDone = saved.mockDone || false;
      } catch (error) {
        console.warn("Progress load failed", error);
      }
    }

    function saveProgress() {
      try {
        localStorage.setItem(storageKey, JSON.stringify({
          date: todayKey,
          xp: state.xp,
          level: state.level,
          streak: state.streak,
          loot: state.loot,
          completed: state.completed,
          downed: state.downed,
          seenKeys: state.seenKeys,
          mastery: state.mastery,
          mockDone: state.mockDone
        }));
      } catch (error) {
        console.warn("Progress save failed", error);
      }
    }

    function render() {
      $("lootCount").textContent = state.loot;
      $("level").textContent = state.level;
      $("nextXp").textContent = Math.max(0, 220 - state.xp);
      $("xpBar").style.width = Math.min(100, state.xp / 220 * 100) + "%";
      $("todayDone").textContent = state.currentMode === "mock"
        ? `${state.score}/${MOCK_TEST_COUNT}`
        : state.mockDone ? "20/20" : `0/${MOCK_TEST_COUNT}`;
      $("downedCount").textContent = activeDowned().length;
      $("reviveBtn").disabled = activeDowned().length > 0;
      $("reviveBtn").textContent = activeDowned().length > 0 ? "先清倒地题" : "复活再玩一局";
      renderAbilities();
      renderQuests();
      renderRevive();
      renderParent();
    }

    function renderAbilities() {
      const penalty = Math.min(12, activeDowned().length * 3);
      $("abilities").innerHTML = subjects.map(subject => {
        const value = Math.max(8, Math.min(99, (state.mastery[subject.id] ?? abilityBase[subject.title] ?? 30) - penalty));
        return `
          <div class="ability-row">
            <b>${subject.title.slice(0, 2)}</b>
            <div class="bar"><i style="width:${value}%; background:${value > 45 ? "linear-gradient(90deg, var(--green), var(--cyan))" : "linear-gradient(90deg, var(--orange), var(--amber))"}"></i></div>
            <span>${value}</span>
          </div>
        `;
      }).join("");
    }

    function questCard(s) {
      const locked = activeDowned().length > 0;
      const done = state.completed[s.id];
      return `
        <article class="planet-card ${s.id} ${locked ? "locked" : ""}" style="--accent:${s.color}" data-subject="${s.id}">
          <span class="tag">${done ? "已通关" : `${s.tag} · ${s.skill}`}</span>
          <h3>${s.title}</h3>
          <p>${s.desc}</p>
          <button class="small" ${locked ? "disabled" : ""}>${locked ? "需复活" : done ? "再开一局" : "进入星球"}</button>
        </article>
      `;
    }

    function renderQuests() {
      $("questGrid").innerHTML = `
        <div class="orbit-ring"></div>
        <div class="orbit-ring second"></div>
        <div class="ship-core">
          <div>
            <strong>CODY</strong>
            <span>先做20题小测，再用星球专项补弱</span>
          </div>
        </div>
        ${subjects.map(questCard).join("")}
      `;
      document.querySelectorAll("[data-subject]").forEach(btn => {
        btn.addEventListener("click", () => startSubject(btn.dataset.subject));
      });
    }

    function renderRevive() {
      if (!state.downed.length) {
        $("reviveList").innerHTML = `
          <div class="revive-card">
            <h3>陨石坑空闲</h3>
            <p>做错的题会掉进这里。先看“讲解+正确答案”，再打一题同科复活题；全部清空才能复活再玩一局。</p>
          </div>
        `;
        return;
      }
      $("reviveList").innerHTML = state.downed.map((item, idx) => `
        <article class="revive-card ${item.seen ? "seen" : ""} ${item.corrected ? "done" : ""}">
          <span class="tag">${item.corrected ? "已复活" : "倒地题"} · ${(tierMeta[item.tier] || tierMeta.secure).label}</span>
          <h3>${item.subjectTitle}</h3>
          <p><b>题目：</b>${item.q}</p>
          <p><b>你的答案：</b>${item.wrong}　<b>正确答案：</b>${item.a}</p>
          <div class="briefing">
            <b>讲解：</b>${item.explain}<br>
            <b>正确答案：</b>${item.a}
          </div>
          ${item.audio ? `<button class="small" data-replay="${idx}">重听音频</button>` : ""}
          <button class="small" data-video="${idx}">${item.seen ? "重看讲解" : "看讲解+正确答案"}</button>
          <button class="small" data-correct="${idx}" ${item.seen && !item.corrected ? "" : "disabled"}>打一题复活挑战</button>
        </article>
      `).join("");
      document.querySelectorAll("[data-video]").forEach(btn => {
        btn.addEventListener("click", () => {
          state.downed[Number(btn.dataset.video)].seen = true;
          saveProgress();
          render();
        });
      });
      document.querySelectorAll("[data-correct]").forEach(btn => {
        btn.addEventListener("click", () => {
          startReviveChallenge(Number(btn.dataset.correct));
        });
      });
      document.querySelectorAll("[data-replay]").forEach(btn => {
        btn.addEventListener("click", () => {
          const item = state.downed[Number(btn.dataset.replay)];
          playPromptAudio(item);
        });
      });
    }

    function renderParent() {
      const done = Object.keys(state.completed).length;
      const needs = activeDowned();
      const focus = needs[0]?.subjectTitle || "暂无倒地题";
      const isComplete = isDayComplete(state);
      const subjectProgress = subjects.map(subject => `
        <div class="progress-chip">
          <b>${subject.title}</b>
          <span>${state.completed[subject.id] ? "已完成" : "未完成"}</span>
        </div>
      `).join("");
      const calendarCells = planDates.map((dateKey, index) => {
        const progress = readProgressForDate(dateKey);
        const completedCount = Object.keys(progress.completed || {}).length;
        const downedCount = activeItems(progress.downed).length;
        const complete = isDayComplete(progress);
        const started = completedCount > 0 || downedCount > 0;
        const isPast = dateKey < todayKey;
        const isToday = dateKey === todayKey;
        const status = complete ? "完成" : started ? "进行中" : isPast ? "未完成" : "未开始";
        const cls = complete ? "complete" : started ? "partial" : isPast ? "missed" : "";
        return `
          <div class="day-cell ${cls} ${isToday ? "today" : ""}">
            <b>${dateKey.slice(5)}${isToday ? " · 今天" : ""}</b>
            <span>${status}</span>
            <span>${progress.mockDone ? "20题完成" : `${completedCount}/3 关`} · ${downedCount} 倒地题</span>
          </div>
        `;
      }).join("");
      $("parentPanel").innerHTML = `
        <div class="parent-row">
          <div>
            <h3>6月16日-6月29日进度雷达</h3>
            <p>每天完成20题考前小测，并清空倒地题，才算当天完成；星球专项用于补薄弱科目。</p>
            <div class="calendar-grid">${calendarCells}</div>
          </div>
          <div class="score">${planDates.filter(dateKey => isDayComplete(readProgressForDate(dateKey))).length}/14</div>
        </div>
        <div class="parent-row">
          <div>
            <h3>今日完成状态</h3>
            <p>${todayKey}：${isComplete ? "今日20题小测已完成，倒地题已清空。" : "今日还未达标，请完成20题小测并清空倒地题。"}</p>
            <div class="progress-grid">${subjectProgress}</div>
          </div>
          <div class="score">${isComplete ? "完成" : "未完成"}</div>
        </div>
        <div class="parent-row">
          <div><h3>今日90分作战节奏</h3><p>每天20题：数学7、语文7、英语6；其中保分题8、提分题8、冲90题4。冲90题专练最后5-10分的阅读、应用、综合题。</p></div>
          <div class="score">${state.mockDone ? "20/20" : `${done}/3`}</div>
        </div>
        <div class="parent-row">
          <div><h3>陨石坑复活机制</h3><p>只要有错题未改正，就不能继续开局。看讲解后还要答对一道同科复活题，才算真正复活。</p></div>
          <div class="score">${needs.length}</div>
        </div>
        <div class="parent-row">
          <div><h3>当前最该补</h3><p>${needs.length ? "先处理这个倒地题，再进入下一局。" : "可以开始新一轮三科任务。"}</p></div>
          <div class="score">${focus}</div>
        </div>
      `;
    }

    function startSubject(id) {
      if (activeDowned().length > 0) {
        document.querySelector('.tab[data-view="revive"]').click();
        return;
      }
      const subject = subjects.find(s => s.id === id);
      if (!subject) return;
      state.currentMode = "subject";
      state.currentSubject = subject;
      state.currentQuestions = pickSubjectQuestions(subject, QUESTIONS_PER_ROUND);
      state.index = 0;
      state.score = 0;
      state.answered = false;
      $("questModal").classList.add("open");
      showQuestion();
    }

    function startMockTest() {
      if (activeDowned().length > 0) {
        document.querySelector('.tab[data-view="revive"]').click();
        return;
      }
      const mixed = subjects.flatMap(subject => pickMockSubjectQuestions(subject));
      state.currentMode = "mock";
      state.currentSubject = { id: "mock", title: "90分考前小测" };
      state.currentQuestions = pickQuestions(mixed, MOCK_TEST_COUNT);
      state.index = 0;
      state.score = 0;
      state.answered = false;
      $("questModal").classList.add("open");
      showQuestion();
    }

    function pickQuestions(pool, count) {
      return [...pool].sort(() => Math.random() - 0.5).slice(0, count);
    }

    function pickMockSubjectQuestions(subject) {
      const plan = mockTierPlan[subject.id] || {};
      const planned = Object.entries(plan).flatMap(([tier, count]) => pickSubjectQuestions(subject, count, tier));
      const target = mockSubjectPlan[subject.id] || planned.length;
      if (planned.length >= target) return planned.slice(0, target);
      const fill = pickSubjectQuestions(subject, target - planned.length);
      return [...planned, ...fill].slice(0, target);
    }

    function pickSubjectQuestions(subject, count, tier = null) {
      if (count <= 0) return [];
      const seen = new Set(state.seenKeys[subject.id] || []);
      const matchesTier = question => !tier || question.tier === tier;
      let pool = subject.questions.filter(question => matchesTier(question) && !seen.has(question.q));
      if (pool.length < count) {
        pool = subject.questions.filter(matchesTier);
      }
      if (pool.length < count) {
        pool = subject.questions.filter(question => !seen.has(question.q));
      }
      if (pool.length < count) {
        pool = subject.questions;
        if (!tier) state.seenKeys[subject.id] = [];
      }
      const selected = pickQuestions(pool, count);
      const nextSeen = new Set(state.seenKeys[subject.id] || []);
      selected.forEach(question => nextSeen.add(question.q));
      state.seenKeys[subject.id] = [...nextSeen].slice(-subject.questions.length);
      saveProgress();
      return selected.map(question => ({
        ...question,
        subjectId: subject.id,
        subjectTitle: subject.title
      }));
    }

    function showQuestion() {
      const subject = state.currentSubject;
      const question = state.currentQuestions[state.index];
      const tier = tierMeta[question.tier] || tierMeta.secure;
      state.answered = false;
      $("questTag").textContent = state.reviveItemIndex === null
        ? `${subject.title}${question.subjectTitle && subject.id === "mock" ? ` · ${question.subjectTitle}` : ""} · ${tier.label}`
        : `${subject.title} · 复活挑战 · ${tier.label}`;
      $("questionTitle").textContent = question.q;
      $("questionProgress").style.width = `${state.index / state.currentQuestions.length * 100}%`;
      $("feedback").textContent = state.reviveItemIndex === null
        ? "选一个答案。错题会进入复活站，看讲解并完成复活挑战后才能复活。"
        : "这是复活挑战题，答对才能清掉刚才那道倒地题。";
      $("answers").innerHTML = question.options.map(opt => `<button class="answer" data-answer="${opt}">${opt}</button>`).join("");
      $("audioLine").classList.toggle("active", Boolean(question.audio || question.speak));
      $("audioNote").textContent = "";
      document.querySelectorAll(".answer").forEach(btn => {
        btn.addEventListener("click", () => answer(btn.dataset.answer, btn));
      });
    }

    function playPromptAudio(question) {
      if (!question) return;
      if (question.audio) {
        const audio = new Audio(question.audio);
        audio.preload = "auto";
        audio.play().catch(() => speakFallback(question.speak || question.q));
        return;
      }
      speakFallback(question.speak || question.q);
    }

    function speakFallback(text) {
      if (!("speechSynthesis" in window)) {
        $("feedback").textContent = "当前浏览器不支持朗读，请查看题目文字。";
        return;
      }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = 0.88;
      const voices = window.speechSynthesis.getVoices();
      const enVoice = voices.find(v => /en[-_](US|GB)/i.test(v.lang)) || voices.find(v => /^en/i.test(v.lang));
      if (enVoice) utterance.voice = enVoice;
      window.speechSynthesis.speak(utterance);
    }

    function answer(value, btn) {
      if (state.answered) return;
      state.answered = true;
      const question = state.currentQuestions[state.index];
      const correct = value === question.a;
      document.querySelectorAll(".answer").forEach(b => {
        if (b.dataset.answer === question.a) b.classList.add("correct");
      });
      if (correct) {
        const tier = tierMeta[question.tier] || tierMeta.secure;
        state.score += 1;
        state.combo += 1;
        state.xp += tier.bonus;
        updateMastery(question.subjectId || state.currentSubject.id, tier.mastery);
        saveProgress();
        if (state.reviveItemIndex !== null) {
          completeReviveChallenge(true);
          return;
        }
        $("feedback").textContent = `命中${tier.label}！${state.combo} 连击，能量 +${tier.bonus}。`;
      } else {
        btn.classList.add("wrong");
        state.combo = 0;
        const tier = tierMeta[question.tier] || tierMeta.secure;
        updateMastery(question.subjectId || state.currentSubject.id, tier.mastery > 2 ? -2 : -1);
        if (state.reviveItemIndex !== null) {
          $("feedback").textContent = `复活挑战失败：先复盘讲解，再打一题。提示：${question.hint}`;
          setTimeout(() => completeReviveChallenge(false), 900);
          return;
        }
        const subjectId = question.subjectId || state.currentSubject.id;
        const subjectTitle = question.subjectTitle || state.currentSubject.title;
        const key = `${subjectId}-${question.q}`;
        if (!state.downed.some(item => item.key === key && !item.corrected)) {
          state.downed.push({
            key,
            subjectId,
            subjectTitle,
            q: question.q,
            a: question.a,
            wrong: value,
            explain: question.explain,
            audio: question.audio,
            speak: question.speak,
            tier: question.tier,
            seen: false,
            corrected: false
          });
        }
        saveProgress();
        $("feedback").textContent = `飞船坠入陨石坑：这题已进入复活站。提示：${question.hint}`;
      }
      render();
    }

    function updateMastery(subjectId, delta) {
      const current = state.mastery[subjectId] ?? 30;
      state.mastery[subjectId] = Math.max(8, Math.min(99, current + delta));
    }

    function nextQuestion() {
      if (!state.currentSubject) return;
      if (state.reviveItemIndex !== null) {
        $("feedback").textContent = "先完成这道复活挑战题。";
        return;
      }
      if (state.index < state.currentQuestions.length - 1) {
        state.index += 1;
        showQuestion();
      } else {
        finishSubject();
      }
    }

    function finishSubject() {
      const subject = state.currentSubject;
      const total = state.currentQuestions.length;
      if (state.currentMode === "mock") {
        state.mockDone = true;
        subjects.forEach(item => { state.completed[item.id] = true; });
      } else {
        state.completed[subject.id] = true;
      }
      if (state.score === total) {
        state.xp += 45;
        state.loot += 1;
        $("feedback").textContent = `${state.currentMode === "mock" ? "90分小测满分通关" : "完美通关"}！本关 ${state.score}/${total}，解锁金色战术箱，额外能量 +45。`;
      } else {
        if (state.score >= Math.ceil(total * 0.75)) state.loot += 1;
        const estimate = state.currentMode === "mock" ? `，折算约 ${Math.round(state.score / total * 100)} 分` : "";
        $("feedback").textContent = `行动结算：本关 ${state.score}/${total}${estimate}。${state.score >= Math.ceil(total * 0.75) ? "获得补给箱；" : ""}错题进入陨石坑，清空后才能领取下一轮装备。`;
      }
      if (state.xp >= 220) {
        state.level += 1;
        state.xp -= 220;
      }
      saveProgress();
      state.currentSubject = null;
      state.currentQuestions = [];
      state.currentMode = "subject";
      $("questionProgress").style.width = "100%";
      setTimeout(() => {
        $("questModal").classList.remove("open");
        render();
        if (activeDowned().length > 0) document.querySelector('.tab[data-view="revive"]').click();
      }, 900);
    }

    function startReviveChallenge(index) {
      const item = state.downed[index];
      if (!item || !item.seen || item.corrected) return;
      const subject = subjects.find(s => s.id === item.subjectId) || subjects.find(s => s.title === item.subjectTitle);
      if (!subject) return;
      const candidates = subject.questions.filter(question => question.q !== item.q);
      state.reviveItemIndex = index;
      state.currentSubject = subject;
      state.currentMode = "revive";
      state.currentQuestions = pickQuestions(candidates.length ? candidates : subject.questions, 1);
      state.index = 0;
      state.score = 0;
      state.answered = false;
      $("questModal").classList.add("open");
      showQuestion();
    }

    function completeReviveChallenge(success) {
      const index = state.reviveItemIndex;
      const item = state.downed[index];
      if (success && item) {
        item.corrected = true;
        state.xp += 18;
        $("feedback").textContent = "复活成功！倒地题已清除，额外能量 +18。";
      }
      saveProgress();
      state.reviveItemIndex = null;
      state.currentSubject = null;
      state.currentQuestions = [];
      state.currentMode = "subject";
      setTimeout(() => {
        $("questModal").classList.remove("open");
        render();
        document.querySelector('.tab[data-view="revive"]').click();
      }, success ? 850 : 350);
    }

    function closeQuestModal() {
      $("questModal").classList.remove("open");
      state.reviveItemIndex = null;
      state.currentSubject = null;
      state.currentQuestions = [];
      state.currentMode = "subject";
      state.answered = false;
      render();
    }

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
        tab.classList.add("active");
        $(tab.dataset.view).classList.add("active");
      });
    });

    document.querySelectorAll("[data-jump]").forEach(btn => {
      btn.addEventListener("click", () => document.querySelector(`.tab[data-view="${btn.dataset.jump}"]`).click());
    });

    $("startToday").addEventListener("click", () => {
      startMockTest();
    });

    $("reviveBtn").addEventListener("click", () => {
      if (activeDowned().length > 0) {
        document.querySelector('.tab[data-view="revive"]').click();
      } else {
        startSubject(subjects[0].id);
      }
    });

    $("closeModal").addEventListener("click", closeQuestModal);
    $("nextQuestion").addEventListener("click", nextQuestion);
    $("showHint").addEventListener("click", () => {
      if (!state.currentSubject) return;
      $("feedback").textContent = state.currentQuestions[state.index].hint;
    });
    $("playAudio").addEventListener("click", () => {
      if (!state.currentSubject) return;
      playPromptAudio(state.currentQuestions[state.index]);
    });

    if ("speechSynthesis" in window) {
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

    loadProgress();
    render();
  </script>
</body>
</html>
