<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Cody星球闯三关</title>
  <style>
    :root {
      --bg: #07111f;
      --panel: rgba(12, 23, 38, 0.94);
      --panel-2: rgba(16, 31, 52, 0.94);
      --paper: #eef6ff;
      --text: #f7fbff;
      --muted: #9eb4cc;
      --dark: #07111f;
      --cyan: #45d7ff;
      --ice: #88f4ff;
      --orange: #ff7a2f;
      --amber: #ffbd4a;
      --red: #ff4054;
      --green: #54f0a0;
      --purple: #9b7cff;
      --radius: 7px;
      --shadow: 0 22px 56px rgba(0, 0, 0, 0.48);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Microsoft YaHei", "Trebuchet MS", sans-serif;
      background:
        radial-gradient(circle at 16% 10%, rgba(69, 215, 255, 0.18), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(255, 122, 47, 0.18), transparent 25%),
        linear-gradient(145deg, #07111f 0%, #10243d 54%, #1e1a31 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.3;
      background-image:
        linear-gradient(90deg, rgba(69, 215, 255, 0.13) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255, 189, 74, 0.10) 1px, transparent 1px),
        repeating-linear-gradient(135deg, transparent 0 28px, rgba(255, 122, 47, 0.08) 28px 34px);
      background-size: 46px 46px, 46px 46px, 128px 128px;
    }

    button { font: inherit; }
    h1, h2, h3, p { margin: 0; }

    .app {
      position: relative;
      width: min(1220px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 36px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .patch {
      width: 62px;
      height: 62px;
      display: grid;
      place-items: center;
      border: 3px solid #000;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--cyan), var(--amber));
      color: var(--dark);
      box-shadow: 5px 5px 0 #000, 0 0 28px rgba(69, 215, 255, 0.35);
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: 20px;
      transform: skew(-4deg);
    }

    h1 {
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: clamp(32px, 5vw, 64px);
      line-height: 0.96;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 7px;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .tab, .btn, .small, .answer {
      min-height: 42px;
      border: 2px solid #000;
      border-radius: var(--radius);
      background: #13243a;
      color: var(--text);
      box-shadow: 3px 3px 0 #000;
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, filter 140ms ease;
    }

    .tab { padding: 9px 12px; }
    .btn { padding: 11px 15px; font-weight: 900; }
    .small { min-height: 34px; padding: 7px 10px; font-weight: 900; }

    .tab:hover, .btn:hover, .small:hover, .answer:hover {
      transform: translate(-1px, -1px);
      box-shadow: 5px 5px 0 #000;
      filter: brightness(1.08);
    }

    .tab.active, .btn.safe {
      background: var(--cyan);
      color: var(--dark);
      font-weight: 900;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--orange), var(--amber));
      color: var(--dark);
    }

    .btn.ghost {
      background: var(--paper);
      color: var(--dark);
    }

    .btn:disabled, .small:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: grayscale(0.8);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.16fr 0.84fr;
      gap: 15px;
    }

    .ops, .status, .card, .revive-card, .parent-row, .modal-card {
      border: 3px solid #000;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      background: var(--panel);
    }

    .ops {
      position: relative;
      min-height: 455px;
      padding: 24px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255,255,255,0.01)),
        repeating-linear-gradient(90deg, rgba(69, 215, 255, 0.08) 0 8px, transparent 8px 24px),
        #101a2a;
    }

    .ops::before {
      content: "";
      position: absolute;
      right: -36px;
      bottom: -36px;
      width: 380px;
      height: 270px;
      border: 4px solid #000;
      border-radius: 12px;
      background:
        linear-gradient(90deg, transparent 0 18%, rgba(136, 244, 255, 0.9) 18% 25%, transparent 25% 75%, rgba(136, 244, 255, 0.9) 75% 82%, transparent 82%),
        radial-gradient(circle at 50% 32%, var(--amber) 0 16%, transparent 17%),
        linear-gradient(145deg, #536b88, #132135 62%, #07111f);
      clip-path: polygon(12% 0, 88% 0, 100% 28%, 90% 100%, 10% 100%, 0 28%);
      box-shadow: inset -30px -22px 0 rgba(0,0,0,0.32), 10px 10px 0 #000, 0 0 46px rgba(69, 215, 255, 0.26);
      animation: drone 4.2s ease-in-out infinite;
    }

    .ops::after {
      content: "CODY ORBIT";
      position: absolute;
      left: 24px;
      bottom: 18px;
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: clamp(42px, 7vw, 92px);
      color: rgba(69, 215, 255, 0.08);
      pointer-events: none;
    }

    @keyframes drone {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-9px) rotate(1deg); }
    }

    .hero-copy {
      position: relative;
      z-index: 1;
      max-width: 630px;
    }

    .kicker {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 7px 10px;
      border: 2px solid #000;
      border-radius: 999px;
      background: var(--cyan);
      color: var(--dark);
      font-weight: 900;
      margin-bottom: 17px;
    }

    .hero-copy h2 {
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: clamp(38px, 6vw, 82px);
      line-height: 0.94;
      letter-spacing: 0;
    }

    .hero-copy p {
      max-width: 560px;
      margin-top: 18px;
      color: #d6e4f2;
      font-size: 17px;
      line-height: 1.68;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 540px;
      margin-top: 25px;
    }

    .stat {
      border: 2px solid #000;
      border-radius: var(--radius);
      padding: 12px;
      background: rgba(3, 7, 13, 0.72);
    }

    .stat strong {
      display: block;
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: 28px;
      line-height: 1;
      color: var(--cyan);
    }

    .stat span { color: var(--muted); font-size: 13px; }

    .status { padding: 18px; }

    .operator {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 14px;
      align-items: center;
      margin-bottom: 15px;
    }

    .helmet {
      height: 92px;
      border: 3px solid #000;
      border-radius: 14px;
      background:
        radial-gradient(circle at 34% 42%, var(--ice) 0 6px, transparent 7px),
        radial-gradient(circle at 66% 42%, var(--ice) 0 6px, transparent 7px),
        linear-gradient(90deg, transparent 0 27%, var(--cyan) 27% 73%, transparent 73%),
        linear-gradient(135deg, #536b88, #101a2a);
      box-shadow: 5px 5px 0 #000, 0 0 24px rgba(69, 215, 255, 0.24);
    }

    .level { font-size: 24px; font-weight: 900; }

    .bar {
      height: 16px;
      border: 2px solid #000;
      border-radius: 999px;
      overflow: hidden;
      background: #07111f;
      margin-top: 8px;
    }

    .bar > i {
      display: block;
      height: 100%;
      width: 34%;
      background: linear-gradient(90deg, var(--cyan), var(--amber));
    }

    .ability { display: grid; gap: 10px; margin-top: 14px; }

    .operator-select {
      display: grid;
      gap: 10px;
    }

    .operator-card {
      display: grid;
      grid-template-columns: 64px 1fr auto;
      gap: 12px;
      align-items: center;
      width: 100%;
      min-height: 82px;
      padding: 10px;
      border: 3px solid #000;
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(69, 215, 255, 0.16), rgba(16, 31, 52, 0.96));
      color: var(--text);
      box-shadow: 4px 4px 0 #000;
      cursor: pointer;
      text-align: left;
    }

    .operator-card.selected {
      background: linear-gradient(135deg, rgba(84, 240, 160, 0.28), rgba(69, 215, 255, 0.18));
      outline: 3px solid var(--green);
    }

    .operator-avatar {
      height: 62px;
      border: 3px solid #000;
      border-radius: 10px;
      display: grid;
      place-items: center;
      color: #07111f;
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: 26px;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,0.75), transparent 18%),
        linear-gradient(145deg, var(--avatar-a), var(--avatar-b));
      box-shadow: inset -10px -8px 0 rgba(0,0,0,0.16);
    }

    .operator-card b { display: block; font-size: 17px; }
    .operator-card span { display: block; color: #c7d7e8; font-size: 12px; line-height: 1.35; }
    .operator-state { color: var(--green); font-weight: 900; white-space: nowrap; }

    .ability-row {
      display: grid;
      grid-template-columns: 76px 1fr 42px;
      gap: 9px;
      align-items: center;
      font-size: 14px;
    }

    main { margin-top: 15px; }
    .view { display: none; }
    .view.active { display: block; animation: rise 240ms ease both; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .planet-map {
      min-height: 560px;
      position: relative;
      display: grid;
      place-items: center;
      overflow: hidden;
      border: 3px solid #000;
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 50% 50%, rgba(69, 215, 255, 0.15), transparent 28%),
        radial-gradient(circle at 18% 22%, rgba(255, 189, 74, 0.16), transparent 16%),
        radial-gradient(circle at 84% 28%, rgba(155, 124, 255, 0.16), transparent 18%),
        linear-gradient(145deg, rgba(10, 21, 36, 0.96), rgba(9, 15, 28, 0.98));
      box-shadow: var(--shadow);
    }

    .orbit-ring {
      position: absolute;
      width: min(72vw, 760px);
      height: min(72vw, 760px);
      max-width: 760px;
      max-height: 760px;
      border: 2px dashed rgba(136, 244, 255, 0.28);
      border-radius: 50%;
      transform: rotate(-11deg);
      pointer-events: none;
    }

    .orbit-ring.second {
      width: min(52vw, 560px);
      height: min(52vw, 560px);
      opacity: 0.78;
      transform: rotate(18deg);
    }

    .ship-core {
      position: relative;
      z-index: 2;
      width: 210px;
      min-height: 168px;
      display: grid;
      place-items: center;
      text-align: center;
      border: 3px solid #000;
      border-radius: 18px;
      background:
        linear-gradient(90deg, transparent 0 17%, rgba(136, 244, 255, 0.88) 17% 25%, transparent 25% 75%, rgba(136, 244, 255, 0.88) 75% 83%, transparent 83%),
        radial-gradient(circle at 50% 34%, var(--amber) 0 15%, transparent 16%),
        linear-gradient(145deg, #536b88, #132135 62%, #07111f);
      clip-path: polygon(12% 0, 88% 0, 100% 28%, 90% 100%, 10% 100%, 0 28%);
      box-shadow: inset -22px -18px 0 rgba(0,0,0,0.24), 9px 9px 0 #000, 0 0 44px rgba(69, 215, 255, 0.28);
    }

    .ship-core strong {
      display: block;
      margin-top: 18px;
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: 32px;
      color: var(--paper);
    }

    .ship-core span {
      display: block;
      color: #c8d8e9;
      font-size: 13px;
      padding: 0 18px;
      line-height: 1.4;
    }

    .planet-card {
      position: absolute;
      z-index: 3;
      width: 230px;
      min-height: 230px;
      display: grid;
      place-items: center;
      text-align: center;
      border: 3px solid #000;
      border-radius: 50%;
      padding: 22px;
      background:
        radial-gradient(circle at 34% 26%, rgba(255,255,255,0.5), transparent 17%),
        radial-gradient(circle at 68% 68%, rgba(0,0,0,0.2), transparent 25%),
        var(--accent, var(--cyan));
      color: #07111f;
      box-shadow: 8px 8px 0 #000, 0 0 34px color-mix(in srgb, var(--accent, var(--cyan)) 42%, transparent);
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
    }

    .planet-card:hover {
      transform: translate(-2px, -4px) scale(1.03);
      box-shadow: 11px 11px 0 #000, 0 0 46px color-mix(in srgb, var(--accent, var(--cyan)) 56%, transparent);
      filter: saturate(1.06);
    }

    .planet-card.locked {
      filter: grayscale(0.75);
      opacity: 0.72;
      cursor: not-allowed;
    }

    .planet-card.math { left: 7%; top: 13%; }
    .planet-card.chinese { right: 7%; top: 17%; }
    .planet-card.english { left: 50%; bottom: 7%; transform: translateX(-50%); }
    .planet-card.english:hover { transform: translate(-50%, -4px) scale(1.03); }

    .planet-card .tag {
      background: rgba(255,255,255,0.8);
      margin-bottom: 8px;
    }

    .planet-card h3 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .planet-card p {
      color: rgba(7, 17, 31, 0.78);
      font-size: 13px;
      line-height: 1.45;
      margin-bottom: 12px;
    }

    .planet-card .small {
      background: rgba(238, 246, 255, 0.92);
      color: #07111f;
    }

    .card {
      min-height: 205px;
      padding: 15px;
      overflow: hidden;
      position: relative;
      background: var(--panel-2);
    }

    .card::after {
      content: "";
      position: absolute;
      right: -38px;
      bottom: -48px;
      width: 136px;
      height: 136px;
      border: 3px solid #000;
      border-radius: 50%;
      background: var(--accent, var(--cyan));
      opacity: 0.72;
    }

    .tag {
      display: inline-block;
      border: 2px solid #000;
      border-radius: 999px;
      padding: 4px 8px;
      background: var(--accent, var(--cyan));
      color: var(--dark);
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 11px;
    }

    .card h3 {
      position: relative;
      z-index: 1;
      font-size: 22px;
      margin-bottom: 8px;
    }

    .card p {
      position: relative;
      z-index: 1;
      color: #c7d7e8;
      font-size: 14px;
      line-height: 1.52;
    }

    .card footer {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 16px;
    }

    .revive-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .revive-card {
      padding: 14px;
      background: var(--panel);
    }

    .revive-card.done {
      background: rgba(20, 47, 64, 0.94);
    }

    .revive-card h3 { font-size: 20px; margin-bottom: 8px; }

    .revive-card p {
      color: #c7d7e8;
      line-height: 1.5;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .briefing {
      display: none;
      border: 2px dashed rgba(69, 215, 255, 0.4);
      border-radius: var(--radius);
      padding: 10px;
      margin: 10px 0;
      color: #edf7ff;
      line-height: 1.55;
      background: rgba(0,0,0,0.2);
    }

    .revive-card.seen .briefing { display: block; }

    .parent {
      display: grid;
      gap: 12px;
    }

    .parent-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 15px;
    }

    .parent-row p {
      color: #c7d7e8;
      margin-top: 5px;
      line-height: 1.5;
    }

    .score {
      font-family: Impact, "Microsoft YaHei", sans-serif;
      font-size: 30px;
      color: var(--cyan);
      white-space: nowrap;
    }

    .progress-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .progress-chip {
      border: 2px solid #000;
      border-radius: var(--radius);
      padding: 10px;
      background: rgba(7, 17, 31, 0.58);
    }

    .progress-chip b {
      display: block;
      color: var(--text);
      margin-bottom: 4px;
    }

    .progress-chip span {
      color: var(--muted);
      font-size: 13px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .day-cell {
      border: 2px solid #000;
      border-radius: var(--radius);
      padding: 10px 8px;
      background: rgba(7, 17, 31, 0.62);
      min-height: 82px;
    }

    .day-cell b {
      display: block;
      color: var(--text);
      margin-bottom: 5px;
    }

    .day-cell span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .day-cell.complete {
      background: rgba(84, 240, 160, 0.22);
    }

    .day-cell.partial {
      background: rgba(255, 189, 74, 0.20);
    }

    .day-cell.missed {
      background: rgba(255, 64, 84, 0.18);
    }

    .day-cell.today {
      outline: 3px solid var(--cyan);
      box-shadow: 0 0 24px rgba(69, 215, 255, 0.20);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.76);
    }

    .modal.open { display: grid; }

    .modal-card {
      width: min(820px, 100%);
      padding: 20px;
    }

    .question-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }

    .question-title {
      font-size: clamp(24px, 4.8vw, 42px);
      line-height: 1.18;
    }

    .audio-line {
      display: none;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin: 12px 0 2px;
    }

    .audio-line.active { display: flex; }

    .audio-note {
      color: var(--muted);
      font-size: 13px;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 16px;
    }

    .answer {
      min-height: 66px;
      padding: 12px;
      text-align: left;
      background: var(--paper);
      color: var(--dark);
      font-size: 18px;
      font-weight: 900;
    }

    .answer.correct { background: var(--green); color: var(--dark); }
    .answer.wrong { background: var(--red); color: white; }

    .feedback {
      min-height: 52px;
      margin-top: 14px;
      padding: 12px;
      border: 2px dashed rgba(69, 215, 255, 0.42);
      border-radius: var(--radius);
      color: #e9f5ff;
      line-height: 1.55;
    }

    .modal-actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    @media (max-width: 900px) {
      .topbar, .hero { grid-template-columns: 1fr; }
      .tabs { justify-content: flex-start; }
      .grid, .revive-list { grid-template-columns: repeat(2, 1fr); }
      .planet-map { min-height: 720px; }
      .planet-card.math { left: 4%; top: 8%; }
      .planet-card.chinese { right: 4%; top: 13%; }
      .planet-card.english { bottom: 6%; }
      .ops { min-height: 540px; }
      .ops::before { width: 280px; height: 215px; }
    }

    @media (max-width: 570px) {
      .app { width: min(100% - 18px, 1220px); padding-top: 12px; }
      .brand { align-items: flex-start; }
      .patch { width: 50px; height: 50px; font-size: 17px; }
      .ops { padding: 16px; min-height: 680px; }
      .stats, .grid, .revive-list, .answers { grid-template-columns: 1fr; }
      .progress-grid { grid-template-columns: 1fr; }
      .calendar-grid { grid-template-columns: repeat(2, 1fr); }
      .planet-map {
        min-height: auto;
        display: grid;
        gap: 14px;
        padding: 16px;
      }
      .orbit-ring { display: none; }
      .ship-core, .planet-card, .planet-card.math, .planet-card.chinese, .planet-card.english {
        position: relative;
        left: auto;
        right: auto;
        top: auto;
        bottom: auto;
        transform: none;
        width: 100%;
        min-height: 150px;
        border-radius: var(--radius);
      }
      .planet-card.english:hover { transform: translate(-2px, -4px) scale(1.02); }

      .helmet { height: 72px; }
    }
  </style>
</head>

  <script>
    const subjects = [
      {
        id: "math",
        title: "数学突击关",
        tag: "第一关",
        skill: "期末题库",
        color: "#45d7ff",
        desc: "选择、判断、填空、计算、图形和应用题，每套 20 题。",
        questions: [
          { q: "12 和 18 的最大公因数是？", a: "6", options: ["3", "6", "12", "36"], hint: "列出共同因数，最大的是 6。", explain: "12 的因数有 1、2、3、4、6、12；18 的因数有 1、2、3、6、9、18。共同因数里最大的是 6。" },
          { q: "4 和 6 的最小公倍数是？", a: "12", options: ["2", "10", "12", "24"], hint: "找共同倍数中最小的。", explain: "4 的倍数有 4、8、12；6 的倍数有 6、12。第一个共同倍数是 12。" },
          { q: "下面哪个数是质数？", a: "29", options: ["21", "27", "29", "39"], hint: "质数只有 1 和它本身两个因数。", explain: "21、27、39 都能被 3 整除，29 只有 1 和 29 两个因数，所以是质数。" },
          { q: "同时是 2、3、5 的倍数的最小两位数是？", a: "30", options: ["10", "15", "20", "30"], hint: "个位是 0，还要能被 3 整除。", explain: "同时是 2 和 5 的倍数，个位必须是 0；再满足 3 的倍数，最小两位数是 30。" },
          { q: "36 的因数一共有多少个？", a: "9个", options: ["6个", "8个", "9个", "12个"], hint: "成对找，平方数中间只算一次。", explain: "36 的因数是 1、2、3、4、6、9、12、18、36，共 9 个。" },
          { q: "3/8 + 1/4 = ?", a: "5/8", options: ["4/12", "1/2", "5/8", "3/10"], hint: "先把 1/4 通分成 2/8。", explain: "异分母分数相加先通分。1/4=2/8，所以 3/8+2/8=5/8。" },
          { q: "7/10 - 1/5 = ?", a: "1/2", options: ["6/5", "6/10", "1/2", "4/10"], hint: "1/5 = 2/10。", explain: "7/10-2/10=5/10，约分后是 1/2。" },
          { q: "把 17/5 化成带分数是？", a: "3又2/5", options: ["2又3/5", "3又2/5", "3又1/5", "4又2/5"], hint: "17 ÷ 5 = 3 余 2。", explain: "分子除以分母，商是整数部分，余数做分子，所以是 3又2/5。" },
          { q: "下面哪个分数等于 3/4？", a: "9/12", options: ["6/10", "9/12", "8/10", "12/9"], hint: "分子分母同时乘同一个数。", explain: "3/4 的分子分母同时乘 3，得到 9/12。" },
          { q: "比较大小：5/6 和 3/4，哪个大？", a: "5/6", options: ["5/6", "3/4", "一样大", "无法比较"], hint: "通分到 12。", explain: "5/6=10/12，3/4=9/12，所以 5/6 更大。" },
          { q: "2/3 + 1/6 = ?", a: "5/6", options: ["3/9", "1/2", "5/6", "4/6"], hint: "2/3 = 4/6。", explain: "4/6+1/6=5/6。" },
          { q: "9/12 约分后是？", a: "3/4", options: ["2/3", "3/4", "4/5", "9/6"], hint: "分子分母同时除以 3。", explain: "9÷3=3，12÷3=4，所以约分为 3/4。" },
          { q: "长方体长 8cm、宽 5cm、高 3cm，体积是？", a: "120cm³", options: ["16cm³", "40cm³", "120cm³", "240cm³"], hint: "体积 = 长 × 宽 × 高。", explain: "8×5×3=120，单位是 cm³。" },
          { q: "正方体棱长 4cm，表面积是？", a: "96cm²", options: ["16cm²", "64cm²", "96cm²", "24cm²"], hint: "一个面是 4×4，再乘 6。", explain: "一个面面积 16cm²，6 个面是 96cm²。" },
          { q: "1 立方分米等于多少立方厘米？", a: "1000cm³", options: ["10cm³", "100cm³", "1000cm³", "10000cm³"], hint: "1dm=10cm，体积要乘三次。", explain: "1dm³ = 10cm×10cm×10cm = 1000cm³。" },
          { q: "一个无盖长方体盒子，求用料面积时算几个面？", a: "5个面", options: ["4个面", "5个面", "6个面", "8个面"], hint: "无盖就是少上面。", explain: "长方体有 6 个面，无盖少算上面，所以算 5 个面。" },
          { q: "正方体体积是 27cm³，它的棱长是？", a: "3cm", options: ["3cm", "6cm", "9cm", "27cm"], hint: "哪个数乘自己三次等于 27？", explain: "3×3×3=27，所以棱长是 3cm。" },
          { q: "一个长方体水箱长 6dm、宽 4dm、高 5dm，最多能装水多少升？", a: "120L", options: ["15L", "24L", "120L", "240L"], hint: "1dm³ = 1L。", explain: "体积 6×4×5=120dm³，也就是 120L。" },
          { q: "长方体有多少条棱？", a: "12条", options: ["6条", "8条", "12条", "24条"], hint: "长方体有 6 个面、8 个顶点、12 条棱。", explain: "长方体的棱分三组，每组 4 条，共 12 条。" },
          { q: "正方体棱长总和是 60cm，棱长是？", a: "5cm", options: ["4cm", "5cm", "6cm", "12cm"], hint: "正方体有 12 条棱。", explain: "60÷12=5，所以棱长是 5cm。" },
          { q: "4、5、6、9 的平均数是？", a: "6", options: ["5", "6", "7", "24"], hint: "总数 ÷ 个数。", explain: "4+5+6+9=24，24÷4=6。" },
          { q: "一组数据：12、15、15、18、20，众数是？", a: "15", options: ["12", "15", "18", "20"], hint: "众数是出现次数最多的数。", explain: "15 出现 2 次，其他数只出现 1 次，所以众数是 15。" },
          { q: "折线统计图最适合看什么？", a: "变化趋势", options: ["变化趋势", "物体形状", "字数多少", "图形面积"], hint: "折线能看升降。", explain: "折线统计图适合表示数量随时间变化的趋势。" },
          { q: "一根 2 米长的绳子，用去 3/5 米，还剩多少米？", a: "1又2/5米", options: ["2/5米", "1又2/5米", "7/5米", "1/5米"], hint: "2=10/5。", explain: "10/5-3/5=7/5=1又2/5。" },
          { q: "48 个苹果平均分袋，每袋同样多且正好分完，每袋可能是？", a: "6个", options: ["5个", "6个", "7个", "10个"], hint: "每袋数量必须是 48 的因数。", explain: "6 是 48 的因数，48÷6=8，能正好分完。" },
          { q: "一个数既是 3 的倍数，又是 5 的倍数，最小的两位数是？", a: "15", options: ["10", "12", "15", "30"], hint: "同时是 3 和 5 的倍数。", explain: "3 和 5 的最小公倍数是 15。" },
          { q: "5/8 和 1/2 比，哪个大？", a: "5/8", options: ["5/8", "1/2", "一样大", "无法比较"], hint: "1/2=4/8。", explain: "5/8 大于 4/8，所以 5/8 大。" },
          { q: "2.5L 等于多少 mL？", a: "2500mL", options: ["25mL", "250mL", "2500mL", "25000mL"], hint: "1L=1000mL。", explain: "2.5×1000=2500mL。" },
          { q: "一个长方体底面积 30cm²，高 4cm，体积是？", a: "120cm³", options: ["34cm³", "60cm³", "120cm³", "240cm³"], hint: "体积=底面积×高。", explain: "30×4=120cm³。" },
          { q: "把 11/4 化成带分数是？", a: "2又3/4", options: ["1又3/4", "2又3/4", "3又2/4", "2又1/4"], hint: "11÷4=2 余 3。", explain: "商 2 做整数部分，余数 3 做分子，所以是 2又3/4。" }
        ]
      },
      {
        id: "chinese",
        title: "语文侦察关",
        tag: "第二关",
        skill: "60题题库",
        color: "#ffbd4a",
        desc: "拼音字词、成语、古诗、课文内容、材料阅读，每套 20 题。",
        questions: [
          { q: "“聚精会神”的意思最接近哪一个？", a: "注意力非常集中", options: ["动作很快", "注意力非常集中", "声音很大", "心情很难过"], hint: "关键词是“聚精”和“会神”。", explain: "聚精会神表示集中全部精神，形容注意力非常集中。" },
          { q: "“弯弯的月亮像小船”使用了什么修辞？", a: "比喻", options: ["拟人", "排比", "比喻", "夸张"], hint: "把月亮比作小船。", explain: "把一种事物说成另一种相似的事物，这是比喻。" },
          { q: "阅读题里问“这段主要写什么”，通常要找什么？", a: "中心意思", options: ["标点符号", "中心意思", "生字数量", "作者年龄"], hint: "问主要内容，就是找中心。", explain: "概括段落主要内容，要抓中心句、关键词和事件主线。" },
          { q: "下面哪个词语有错别字？", a: "再接再励", options: ["坚持不懈", "再接再励", "全神贯注", "恍然大悟"], hint: "正确写法是“再接再厉”。", explain: "“再接再厉”的“厉”表示奋勉，不是鼓励的“励”。" },
          { q: "作文结尾最重要的作用是？", a: "点明中心", options: ["增加字数", "点明中心", "随便收尾", "只写天气"], hint: "好结尾要收住主题。", explain: "作文结尾常用来总结全文、点明中心、升华感受。" },
          { q: "“神机妙算”常用来形容谁？", a: "计谋高明的人", options: ["跑得快的人", "计谋高明的人", "声音大的人", "很懒的人"], hint: "神机和妙算都和计谋有关。", explain: "神机妙算形容计谋高明、预料准确。" },
          { q: "“他急得像热锅上的蚂蚁”用了什么修辞？", a: "比喻", options: ["比喻", "拟人", "反问", "设问"], hint: "把着急的人比作蚂蚁。", explain: "用相似事物来说明状态，是比喻。" },
          { q: "“小草偷偷地从土里钻出来”用了什么修辞？", a: "拟人", options: ["比喻", "拟人", "排比", "夸张"], hint: "偷偷、钻出来像人的动作。", explain: "把小草当作人来写，这是拟人。" },
          { q: "下列哪个是描写人物神态的词？", a: "眉开眼笑", options: ["健步如飞", "眉开眼笑", "大声朗读", "仔细观察"], hint: "神态是脸上的表情。", explain: "眉开眼笑描写人的表情，属于神态描写。" },
          { q: "“举世闻名”的意思是？", a: "全世界都知道", options: ["只在本地有名", "全世界都知道", "声音很响", "马上出发"], hint: "举世就是全世界。", explain: "举世闻名表示全世界都知道，形容名气很大。" },
          { q: "“既……又……”表示什么关系？", a: "并列", options: ["转折", "因果", "并列", "假设"], hint: "两个方面同时存在。", explain: "既……又……连接两个并列特点。" },
          { q: "“因为……所以……”表示什么关系？", a: "因果", options: ["并列", "因果", "递进", "选择"], hint: "前面是原因，后面是结果。", explain: "因为表示原因，所以表示结果，是因果关系。" },
          { q: "修改病句：他的学习成绩增加了。哪项更合适？", a: "他的学习成绩提高了。", options: ["他的学习成绩提高了。", "他的学习成绩长高了。", "他的学习成绩扩大了。", "他的学习成绩很响。"], hint: "成绩搭配“提高”。", explain: "成绩不能说增加，常说提高。" },
          { q: "“络绎不绝”常形容什么？", a: "人或车连续不断", options: ["非常安静", "人或车连续不断", "天气寒冷", "颜色鲜艳"], hint: "不绝就是不断。", explain: "络绎不绝形容人、车等前后相接，连续不断。" },
          { q: "阅读理解中“联系上下文”主要是为了？", a: "理解词句意思", options: ["数标点", "理解词句意思", "抄写全文", "找页码"], hint: "上下文能帮助判断意思。", explain: "词语在不同语境中意思可能不同，要结合前后文理解。" },
          { q: "“难道这不是伟大的奇观吗？”是什么句式？", a: "反问句", options: ["陈述句", "反问句", "祈使句", "感叹句"], hint: "难道……吗常是反问。", explain: "反问句用疑问形式表达肯定或否定的意思。" },
          { q: "“请把门关上。”是什么句式？", a: "祈使句", options: ["祈使句", "反问句", "设问句", "陈述句"], hint: "表示请求或命令。", explain: "祈使句用于请求、命令、劝告等。" },
          { q: "“春风又绿江南岸”中“绿”字好在哪里？", a: "写出春天生机", options: ["表示颜色难看", "写出春天生机", "说明天气寒冷", "表示声音很大"], hint: "绿让景色有变化。", explain: "绿字生动写出春天到来、万物复苏的景象。" },
          { q: "下面哪个词语适合形容认真读书？", a: "专心致志", options: ["东张西望", "专心致志", "漫不经心", "心不在焉"], hint: "找注意力集中的词。", explain: "专心致志形容一心一意，注意力集中。" },
          { q: "“画蛇添足”告诉我们什么道理？", a: "多余的事反而坏事", options: ["速度越快越好", "多余的事反而坏事", "要画得漂亮", "蛇很可怕"], hint: "添足是多此一举。", explain: "画蛇添足比喻做了多余的事，反而不恰当。" },
          { q: "概括文章主要内容时，通常不需要写什么？", a: "无关细节", options: ["人物", "事件", "结果", "无关细节"], hint: "概括要简洁。", explain: "概括主要内容要抓重点，不写无关细节。" },
          { q: "“顿时”表示什么？", a: "时间很短，马上", options: ["很久以后", "时间很短，马上", "慢慢地", "以前"], hint: "顿时就是立刻。", explain: "顿时表示动作或情况马上发生。" },
          { q: "下面哪个是近义词搭配？", a: "美丽—漂亮", options: ["美丽—漂亮", "认真—马虎", "高兴—难过", "寒冷—炎热"], hint: "意思相近。", explain: "美丽和漂亮意思相近，是近义词。" },
          { q: "下面哪个是反义词搭配？", a: "谦虚—骄傲", options: ["谦虚—骄傲", "美丽—漂亮", "认真—仔细", "快乐—高兴"], hint: "意思相反。", explain: "谦虚和骄傲意思相反，是反义词。" },
          { q: "作文写事时，最基本要交代什么？", a: "时间地点人物事件", options: ["只写天气", "时间地点人物事件", "只写结尾", "只写题目"], hint: "记叙文六要素。", explain: "写事要交代时间、地点、人物、起因、经过、结果。" },
          { q: "“兴高采烈”表示什么心情？", a: "高兴", options: ["高兴", "害怕", "伤心", "生气"], hint: "兴高和采烈都表示开心。", explain: "兴高采烈形容非常高兴、兴致很高。" },

    function incompleteSubjects() {
      return subjects.filter(subject => !state.completed[subject.id]);
    }

    function requireOperator() {
      if (state.selectedOperator) return true;
      state.selectedOperator = operators[0].id;
      saveProgress();
      renderOperators();
      return true;
    }

    function creditsForScore(percent) {
      if (percent >= 100) return 100;
      if (percent >= 90) return 60;
      if (percent >= 80) return 30;
      return 0;
    }

    function startSubject(id) {
      if (!requireOperator()) return;
      if (activeDowned().length > 0) {
        document.querySelector('.tab[data-view="revive"]').click();
        return;
      }
      const subject = subjects.find(s => s.id === id);
      if (!subject) return;
      state.currentMode = "subject";
      state.currentSubject = subject;
      state.currentQuestions = pickSubjectPaperQuestions(subject);
      state.index = 0;
      state.score = 0;
      state.answered = false;
      $("questModal").classList.add("open");
      showQuestion();
    }

    function pickQuestions(pool, count) {
      return [...pool].sort(() => Math.random() - 0.5).slice(0, count);
    }

    function questionKind(subjectId, question) {
      if (question.kind) return question.kind;
      const text = `${question.q} ${question.hint || ""} ${question.explain || ""}`;
      if (subjectId === "math") {
        if (/众数|中位数|平均数|折线|统计|变化/.test(text)) return "统计";
        if (/切成|表面积最多|无盖|用料|至少需要/.test(text)) return "冲90图形";
        if (/长方体|正方体|体积|容积|升|L|mL|dm³|cm³|棱|表面积/.test(text)) return "图形体积";
        if (/每段长|全长的|问的是|易错|平均分成/.test(text)) return "易错辨析";
        if (/分数|通分|约分|带分数|几分之几/.test(text) || text.includes("/")) return "分数计算";
        if (/因数|倍数|公因数|公倍数|最小公倍数|最大公因数|整除/.test(text)) return "因数倍数";
        return "分数计算";
      }
      if (subjectId === "chinese") {
        if (/启示|开放|联系生活|怎么回答|答法/.test(text)) return "开放表达";
        if (/中心|道理|告诉我们|表达/.test(text)) return "中心理解";
        if (/特点|品质|人物|性格|表现了/.test(text)) return "人物分析";
        if (/短文|阅读|主要写|概括|标题|作用/.test(text)) return "阅读概括";
        if (/诗句|古诗|生字|字词|读音|书写|成语|默写/.test(text)) return "字词古诗";
        return "表达运用";
      }
      if (subjectId === "english") {
        if (/听句理解|听问句|audio|录音/.test(text)) return "听句理解";
        if (/词义|意思最接近|protect|mean/.test(text)) return "词义语境";
        if (/Read and choose|阅读理解|passage|Which title|What can|When is/.test(text)) return "阅读理解";
        if (/语法|意义辨析|____|句型|can 后|On /.test(text)) return "语法语境";
        if (/写作|Favourite|结尾/.test(text)) return "写作表达";
        return "阅读理解";
      }
      return question.tier || "default";
    }

    function pickBalancedQuestions(subject, pool, total, tierPlan, kindPlan) {
      const used = new Set();
      const planned = [];
      const takeFrom = (candidates, count) => {
        pickQuestions(candidates.filter(question => !used.has(question.q)), count).forEach(question => {
          if (planned.length < total && !used.has(question.q)) {
            used.add(question.q);
            planned.push(question);
          }
        });
      };
      Object.entries(kindPlan || {}).forEach(([kind, count]) => {
        takeFrom(pool.filter(question => questionKind(subject.id, question) === kind), count);
      });
      const tierOrder = { stretch: 0, improve: 1, secure: 2 };
      Object.entries(tierPlan || {}).sort((a, b) => (tierOrder[a[0]] ?? 9) - (tierOrder[b[0]] ?? 9)).forEach(([tier, count]) => {
        const currentTierCount = planned.filter(question => question.tier === tier).length;
        takeFrom(pool.filter(question => question.tier === tier), Math.max(0, count - currentTierCount));
      });
      Object.entries(tierPlan || {}).sort((a, b) => (tierOrder[a[0]] ?? 9) - (tierOrder[b[0]] ?? 9)).forEach(([tier, count]) => {
        while (planned.filter(question => question.tier === tier).length < count) {
          const candidate = pickQuestions(pool.filter(question => question.tier === tier && !used.has(question.q)), 1)[0];
          if (!candidate) break;
          const replaceTier = tier === "stretch" ? ["secure", "improve"] : tier === "improve" ? ["secure"] : [];
          const replaceIndex = planned.findIndex(question => replaceTier.includes(question.tier));
          if (replaceIndex === -1) break;
          used.delete(planned[replaceIndex].q);
          planned[replaceIndex] = candidate;
          used.add(candidate.q);
        }
      });
      if (subject.id === "english") {
        while (planned.filter(question => question.audioText || question.speak).length < 5) {
          const candidate = pickQuestions(pool.filter(question => (question.audioText || question.speak) && !used.has(question.q)), 1)[0];
          if (!candidate) break;
          const replaceIndex = planned.findIndex(question => !(question.audioText || question.speak));
          if (replaceIndex === -1) break;
          used.delete(planned[replaceIndex].q);
          planned[replaceIndex] = candidate;
          used.add(candidate.q);
        }
      }
      takeFrom(pool, total - planned.length);
      return planned.slice(0, total).map(question => ({
        ...question,
        subjectId: subject.id,
        subjectTitle: subject.title
      }));
    }

    function pickMockSubjectQuestions(subject) {
      const plan = mockTierPlan[subject.id] || {};
      const used = new Set();
      const planned = [];
      Object.entries(plan).forEach(([tier, count]) => {
        const picked = pickSubjectQuestions(subject, count, tier, used);
        picked.forEach(question => {
          used.add(question.q);
          planned.push(question);
        });
      });
      const target = mockSubjectPlan[subject.id] || planned.length;
      if (planned.length >= target) return planned.slice(0, target);
      const fill = pickSubjectQuestions(subject, target - planned.length, null, used);
      fill.forEach(question => {
        if (!used.has(question.q)) {
          used.add(question.q);
          planned.push(question);
        }
      });
      return planned.slice(0, target);
    }

    function pickSubjectPaperQuestions(subject) {
      const plan = subjectPaperPlan[subject.id] || {};
      const used = new Set();
      const planned = [];
      const dailyPool = subject.questions.filter(question => question.dayIndex === currentExamDayIndex);
      if (dailyPool.length >= QUESTIONS_PER_ROUND) {
        return pickBalancedQuestions(subject, dailyPool, QUESTIONS_PER_ROUND, plan, subjectKindPlan[subject.id]);
      }
      Object.entries(plan).forEach(([tier, count]) => {
        const picked = pickSubjectQuestions(subject, count, tier, used);
        picked.forEach(question => {
          used.add(question.q);
          planned.push(question);
        });
      });
      if (planned.length >= QUESTIONS_PER_ROUND) return planned.slice(0, QUESTIONS_PER_ROUND);
      const fill = pickSubjectQuestions(subject, QUESTIONS_PER_ROUND - planned.length, null, used);
      fill.forEach(question => {
        if (!used.has(question.q)) {
          used.add(question.q);
          planned.push(question);
        }
      });
      return planned.slice(0, QUESTIONS_PER_ROUND);
    }

    function pickSubjectQuestions(subject, count, tier = null, excludeKeys = new Set()) {
      if (count <= 0) return [];
      const seen = new Set(state.seenKeys[subject.id] || []);
      const matchesTier = question => !tier || question.tier === tier;
      const fresh = question => !seen.has(question.q) && !excludeKeys.has(question.q);
      const unused = question => !excludeKeys.has(question.q);
      let pool = subject.questions.filter(question => matchesTier(question) && fresh(question));
      if (pool.length < count) {
        pool = subject.questions.filter(question => matchesTier(question) && unused(question));
      }
      if (pool.length < count) {
        pool = subject.questions.filter(question => fresh(question));
      }
      if (pool.length < count) {
        pool = subject.questions.filter(unused);
        if (!tier) state.seenKeys[subject.id] = [];
      }
      if (pool.length < count) pool = subject.questions;
      const selected = [];
      const localSeen = new Set(excludeKeys);
      pickQuestions(pool, pool.length).forEach(question => {
        if (selected.length < count && !localSeen.has(question.q)) {
          selected.push(question);
          localSeen.add(question.q);
        }
      });
      const nextSeen = new Set(state.seenKeys[subject.id] || []);
      selected.forEach(question => nextSeen.add(question.q));
      state.seenKeys[subject.id] = [...nextSeen].slice(-subject.questions.length);
      saveProgress();
      return selected.map(question => ({
        ...question,
        subjectId: subject.id,
        subjectTitle: subject.title
      }));
    }

    function showQuestion() {
      const subject = state.currentSubject;
      const question = state.currentQuestions[state.index];
      const tier = tierMeta[question.tier] || tierMeta.secure;
      state.answered = false;
      $("questTag").textContent = state.reviveItemIndex === null
        ? `${subject.title}${question.subjectTitle && subject.id === "mock" ? ` · ${question.subjectTitle}` : ""} · ${tier.label}`
        : `${subject.title} · 复活挑战 · ${tier.label}`;
      $("questionTitle").textContent = question.q;
      $("questionProgress").style.width = `${state.index / state.currentQuestions.length * 100}%`;
      $("feedback").textContent = state.reviveItemIndex === null
        ? "选一个答案。错题会进入复活站，看讲解并完成复活挑战后才能复活。"
        : "这是复活挑战题，答对才能清掉刚才那道倒地题。";
      const hasAudioPrompt = Boolean(listeningText(question));
      $("audioLine").classList.toggle("active", hasAudioPrompt);
      $("audioNote").textContent = hasAudioPrompt ? "听完后选择你听到的内容。" : "";
      $("answers").innerHTML = question.options.map(opt => `<button class="answer" data-answer="${opt}">${opt}</button>`).join("");
      document.querySelectorAll(".answer").forEach(btn => {
        btn.addEventListener("click", () => answer(btn.dataset.answer, btn));
      });
    }

    let currentListeningAudio = null;

    function listeningText(question) {
      return question ? (question.audioText || question.speak || "") : "";
    }

    function audioFileNameForText(text) {
      let hash = 0;
      for (let i = 0; i < text.length; i += 1) {
        hash = ((hash << 5) - hash + text.charCodeAt(i)) | 0;
      }
      return `audio/tts-${Math.abs(hash).toString(36)}.wav`;
    }

    function speakWithBrowser(text, question) {
      if (!("speechSynthesis" in window)) {
        $("feedback").textContent = `当前浏览器拦截了听力，请家长临时代读：${text}`;
        return;
      }
      window.speechSynthesis.cancel();
      if (window.speechSynthesis.resume) window.speechSynthesis.resume();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = (question && question.audioRate) || 0.82;
      const voices = window.speechSynthesis.getVoices();
      const enVoice = voices.find(v => /en[-_](US|GB)/i.test(v.lang)) || voices.find(v => /^en/i.test(v.lang));
      if (enVoice) utterance.voice = enVoice;
      let started = false;
      utterance.onstart = () => {
        started = true;
        $("feedback").textContent = "听力播放中...";
      };
      utterance.onend = () => {
        $("feedback").textContent = "听力播放完毕。可以再听一遍，然后选择答案。";
      };
      utterance.onerror = () => {
        $("feedback").textContent = `微信浏览器拦截了朗读，请家长临时代读：${text}`;
      };
      window.speechSynthesis.speak(utterance);
      setTimeout(() => {
        if (!started && !window.speechSynthesis.speaking) {
          $("feedback").textContent = `如果仍没有声音，请点右上角用浏览器打开，或家长临时代读：${text}`;
        }
      }, 1300);
    }

    function playPromptAudio(question) {
      const text = listeningText(question);
      if (!text) {
        $("feedback").textContent = "这题没有听力文本。";
        return;
      }
      $("feedback").textContent = "正在启动听力...";
      if (currentListeningAudio) {
        currentListeningAudio.pause();
        currentListeningAudio.currentTime = 0;
      }
      const audio = new Audio(audioFileNameForText(text));
      currentListeningAudio = audio;
      audio.preload = "auto";
      audio.onplaying = () => {
        $("feedback").textContent = "听力播放中...";
      };
      audio.onended = () => {
        $("feedback").textContent = "听力播放完毕。可以再听一遍，然后选择答案。";
      };
      audio.onerror = () => speakWithBrowser(text, question);
      const playTask = audio.play();
      if (playTask && playTask.catch) {
        playTask.catch(() => speakWithBrowser(text, question));
      }
    }

    function answer(value, btn) {
      if (state.answered) return;
      state.answered = true;
      const question = state.currentQuestions[state.index];
      const correct = value === question.a;
      document.querySelectorAll(".answer").forEach(b => {
        if (b.dataset.answer === question.a) b.classList.add("correct");
      });
      if (correct) {
        const tier = tierMeta[question.tier] || tierMeta.secure;
        state.score += 1;
        state.combo += 1;
        state.xp += tier.bonus;
        updateMastery(question.subjectId || state.currentSubject.id, tier.mastery);
        saveProgress();
        if (state.reviveItemIndex !== null) {
          completeReviveChallenge(true);
          return;
        }
        $("feedback").textContent = `命中${tier.label}！${state.combo} 连击，能量 +${tier.bonus}。`;
      } else {
        btn.classList.add("wrong");
        state.combo = 0;
        const tier = tierMeta[question.tier] || tierMeta.secure;
        updateMastery(question.subjectId || state.currentSubject.id, tier.mastery > 2 ? -2 : -1);
        if (state.reviveItemIndex !== null) {
          $("feedback").textContent = `复活挑战失败：先复盘讲解，再打一题。提示：${question.hint}`;
          setTimeout(() => completeReviveChallenge(false), 900);
          return;
        }
        const subjectId = question.subjectId || state.currentSubject.id;
        const subjectTitle = question.subjectTitle || state.currentSubject.title;
        const key = `${subjectId}-${question.q}`;
        if (!state.downed.some(item => item.key === key && !item.corrected)) {
          state.downed.push({
            key,
            subjectId,
            subjectTitle,
            q: question.q,
            a: question.a,
            wrong: value,
            explain: question.explain,
            tier: question.tier,
            seen: false,
            corrected: false
          });
        }
        saveProgress();
        $("feedback").textContent = `飞船坠入陨石坑：这题已进入复活站。提示：${question.hint}`;
      }
      render();
    }

    function updateMastery(subjectId, delta) {
      const current = state.mastery[subjectId] ?? 30;
      state.mastery[subjectId] = Math.max(8, Math.min(99, current + delta));
    }

    function nextQuestion() {
      if (!state.currentSubject) return;
      if (state.reviveItemIndex !== null) {
        $("feedback").textContent = "先完成这道复活挑战题。";
        return;
      }
      if (state.index < state.currentQuestions.length - 1) {
        state.index += 1;
        showQuestion();
      } else {
        finishSubject();
      }
    }

    function finishSubject() {
      const subject = state.currentSubject;
      const total = state.currentQuestions.length;
      const percent = Math.round(state.score / total * 100);
      let awardedCredits = 0;
      let firstMockSettlement = false;
      if (state.currentMode === "mock") {
        state.mockDone = true;
        state.lastMockScore = state.score;
        state.lastMockTotal = total;
        state.lastMockPercent = percent;
        subjects.forEach(item => { state.completed[item.id] = true; });
        if (!state.mockRewardClaimed) {
          firstMockSettlement = true;
          awardedCredits = creditsForScore(percent);
          state.credits += awardedCredits;
          if (awardedCredits > 0) state.mockRewardClaimed = true;
        }
      } else {
        state.completed[subject.id] = true;
        state.subjectScores[subject.id] = percent;
        if (!state.subjectRewarded[subject.id]) {
          awardedCredits = creditsForScore(percent);
          state.credits += awardedCredits;
          if (awardedCredits > 0) state.subjectRewarded[subject.id] = true;
        }
        const completedCount = Object.keys(state.completed || {}).length;
        if (completedCount === subjects.length) {
          const scores = subjects.map(item => state.subjectScores[item.id]).filter(score => Number.isFinite(score));
          const average = scores.length ? Math.round(scores.reduce((sum, score) => sum + score, 0) / scores.length) : percent;
          state.mockDone = true;
          state.lastMockScore = scores.reduce((sum, score) => sum + score, 0);
          state.lastMockTotal = scores.length * 100;
          state.lastMockPercent = average;
        }
      }
      const rewardText = state.currentMode === "mock"
        ? (awardedCredits > 0 ? ` 本次三科卷奖励 ${awardedCredits} 积分，去仓库兑换装备。` : firstMockSettlement ? " 本次低于80分，复盘后再冲80分拿积分。" : " 今天积分已结算，重复三科卷只记录新分数。")
        : (awardedCredits > 0 ? ` 本科卷奖励 ${awardedCredits} 积分，去仓库兑换装备。` : state.subjectRewarded[subject.id] ? " 本科卷已结算过积分，重复练习只记录新分数。" : " 本科卷低于80分，复盘后再冲80分拿积分。");
      if (state.score === total) {
        state.xp += 45;
        state.loot += 1;
        $("feedback").textContent = `${state.currentMode === "mock" ? `三科卷得分 ${percent} 分，超过90分目标` : "完美通关"}！本关 ${state.score}/${total}，解锁金色战术箱，额外能量 +45。${rewardText}`;
      } else {
        if (state.score >= Math.ceil(total * 0.75)) state.loot += 1;
        const estimate = state.currentMode === "mock" ? `，三科卷得分 ${percent} 分，距离90分还差 ${Math.max(0, 90 - percent)} 分` : "";
        $("feedback").textContent = `行动结算：本关 ${state.score}/${total}${estimate}。${state.score >= Math.ceil(total * 0.75) ? "获得补给箱；" : ""}错题进入陨石坑，清空后才能领取下一轮装备。${rewardText}`;
      }
      if (state.xp >= 220) {
        state.level += 1;
        state.xp -= 220;
      }
      saveProgress();
      state.currentSubject = null;
      state.currentQuestions = [];
      state.currentMode = "subject";
      $("questionProgress").style.width = "100%";
      setTimeout(() => {
        $("questModal").classList.remove("open");
        render();
        if (activeDowned().length > 0) document.querySelector('.tab[data-view="revive"]').click();
      }, 900);
    }

    function startReviveChallenge(index) {
      const item = state.downed[index];
      if (!item || !item.seen || item.corrected) return;
      const subject = subjects.find(s => s.id === item.subjectId) || subjects.find(s => s.title === item.subjectTitle);
      if (!subject) return;
      const candidates = subject.questions.filter(question => question.q !== item.q);
      state.reviveItemIndex = index;
      state.currentSubject = subject;
      state.currentMode = "revive";
      state.currentQuestions = pickQuestions(candidates.length ? candidates : subject.questions, 1);
      state.index = 0;
      state.score = 0;
      state.answered = false;
      $("questModal").classList.add("open");
      showQuestion();
    }

    function completeReviveChallenge(success) {
      const index = state.reviveItemIndex;
      const item = state.downed[index];
      if (success && item) {
        item.corrected = true;
        state.xp += 18;
        const medicBonus = state.selectedOperator === "medic" ? 5 : 0;
        state.credits += medicBonus;
        $("feedback").textContent = `复活成功！倒地题已清除，额外能量 +18。${medicBonus ? "医疗干员奖励 +5 积分。" : ""}`;
      }
      saveProgress();
      state.reviveItemIndex = null;
      state.currentSubject = null;
      state.currentQuestions = [];
      state.currentMode = "subject";
      setTimeout(() => {
        $("questModal").classList.remove("open");
        render();
        document.querySelector('.tab[data-view="revive"]').click();
      }, success ? 850 : 350);
    }

    function closeQuestModal() {
      $("questModal").classList.remove("open");
      state.reviveItemIndex = null;
      state.currentSubject = null;
      state.currentQuestions = [];
      state.currentMode = "subject";
      state.answered = false;
      render();
    }

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
        tab.classList.add("active");
        $(tab.dataset.view).classList.add("active");
      });
    });

    document.querySelectorAll("[data-jump]").forEach(btn => {
      btn.addEventListener("click", () => document.querySelector(`.tab[data-view="${btn.dataset.jump}"]`).click());
    });

    $("startToday").addEventListener("click", () => {
      const next = incompleteSubjects()[0];
      if (activeDowned().length > 0) {
        document.querySelector('.tab[data-view="revive"]').click();
        return;
      }
      if (next) {
        startSubject(next.id);
      } else {
        startSubject(subjects[0].id);
      }
    });

    $("reviveBtn").addEventListener("click", () => {
      if (activeDowned().length > 0) {
        document.querySelector('.tab[data-view="revive"]').click();
      } else {
        startSubject(subjects[0].id);
      }
    });

    $("closeModal").addEventListener("click", closeQuestModal);
    $("nextQuestion").addEventListener("click", nextQuestion);
    $("showHint").addEventListener("click", () => {
      if (!state.currentSubject) return;
      $("feedback").textContent = state.currentQuestions[state.index].hint;
    });
    $("playAudio").addEventListener("click", () => {
      if (!state.currentSubject) return;
      playPromptAudio(state.currentQuestions[state.index]);
    });
    if ("speechSynthesis" in window) {
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }
    loadProgress();
    render();
  </script>
</body>
</html>
